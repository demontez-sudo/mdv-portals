/* ════════════════════════════════════════════════════════════════
   Updated card() for renderModelTasks — 4-stage status
════════════════════════════════════════════════════════════════ */
/* ================================================================
   MODEL TASKS — rebuilt with 5 views
   List | Agenda | Day | Week | 2 Weeks
================================================================ */
var _mtView   = 'list';   // list | agenda | daily | weekly | twoweek
var _mtOffset = 0;

function renderModelTasks(el){
  /* ── Load data ── */
  var schedule  = loadScheduleM();
  var mm        = schedule.find(function(x){ return x.id===whoKey; });
  var requests  = loadModelRequestsM();
  var statusMap = loadTaskStatusM();

  /* ── Build task list ── */
  var items=[];
  if(mm){
    mm.wks.forEach(function(wk,wi){
      wk.t.forEach(function(t,ti){
        var uid = mm.id+'-w'+wi+'t'+ti;
        if(!requests[uid]) return;
        items.push({uid:uid, t:t, wi:wi, ti:ti});
      });
    });
  }

  function normSt(uid,base){
    var raw=statusMap[uid]||base||'not_started';
    return {done:'completed',completed:'completed',in_progress:'in_progress',on_hold:'on_hold'}[raw]||'not_started';
  }

  /* ── Calendar items (for non-list views) ── */
  var today = new Date(); today.setHours(0,0,0,0);
  var startDate = new Date(today); startDate.setDate(startDate.getDate()+_mtOffset);
  var calItems = items.map(function(it){
    var t=it.t;
    var st=normSt(it.uid,t[4]);
    return {
      id:'task_'+it.uid, title:t[1]||'Task', date:t[5]||'', time:t[6]||'',
      type:'Task', model:whoKey, notes:t[2]||'', client:'', status:st,
      isTask:true, uid:it.uid, cat:t[0]||'other',
      isDone:st==='completed'
    };
  }).filter(function(e){ return e.date; });

  var typeColor = function(type){
    return {Task:'var(--gold)',Travel:'var(--burg)',Casting:'var(--sage)',
            Training:'var(--ink2)',Other:'var(--mute)'}[type]||'var(--gold)';
  };

  /* ── Header ── */
  var open = items.filter(function(it){ return normSt(it.uid,it.t[4])!=='completed'; });
  var done = items.filter(function(it){ return normSt(it.uid,it.t[4])==='completed'; });

  var h='<div class="ph"><h1 class="ph-h1">My <em>Tasks</em></h1>'
    +'<div class="ph-sub">'+open.length+' open &nbsp;&middot;&nbsp; '+done.length+' completed</div>'
    +'</div><div class="cnt">';

  /* ── Assigned by Agency — tasks an agent sent directly, editable by
     agents only; the model can update status but not the details ── */
  var agentTasks = loadAgentTasks().filter(function(t){ return t.toKey===whoKey; })
    .sort(function(a,b){ return (a.due||'9999')>(b.due||'9999')?1:-1; });
  if(agentTasks.length){
    h+='<div class="f-section-hd">Assigned by Agency</div>';
    agentTasks.forEach(function(t){
      var isDone=t.status==='done';
      var fromAgent=TEAM[t.fromKey]||{};
      var catColor={'Booking':'var(--gold)','Casting':'var(--sage)','Meeting':'var(--burg)','Movement':'var(--gold)','Daily Agenda':'var(--mute)','Weekly Submission':'var(--mute)','Job':'var(--gold)'}[t.category]||'var(--gold)';
      h+='<div style="border:1px solid var(--line);border-left:3px solid '+catColor+';padding:14px 16px;margin-bottom:8px;background:var(--paper)'+(isDone?';opacity:.6':'')+'">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px">'
          +'<div style="font-family:var(--fD);font-size:16px;color:var(--ink)'+(isDone?';text-decoration:line-through':'')+'">'+esc(t.title||'Task')+'</div>'
          +'<span style="font-family:var(--fM);font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;color:'+catColor+';border:1px solid '+catColor+';padding:2px 8px;flex-shrink:0;white-space:nowrap">'+esc(t.category||'Task')+'</span>'
        +'</div>'
        +'<div style="font-family:var(--fM);font-size:9.5px;color:var(--mute);margin-bottom:8px">From '+esc(fromAgent.name||'Agency')+(t.due?' \u00b7 '+esc(t.due):'')+(t.time?' \u00b7 '+esc(t.time):'')+'</div>'
        +(t.notes?'<div style="font-family:var(--fM);font-size:11px;color:var(--ink2);line-height:1.6;margin-bottom:8px">'+esc(t.notes)+'</div>':'')
        +(!isDone?'<button onclick="modelSetTaskStatus(\''+esc(t.id)+'\',\'done\')" style="font-family:var(--fM);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:6px 14px;background:var(--sage);border:none;color:#fff;cursor:pointer">Mark Complete</button>'
          :'<button onclick="modelSetTaskStatus(\''+esc(t.id)+'\',\'open\')" style="font-family:var(--fM);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:6px 14px;background:none;border:1px solid var(--line);color:var(--mute);cursor:pointer">Reopen</button>')
      +'</div>';
    });
  }

  /* ── View toolbar ── */
  var step = _mtView==='daily'?1:_mtView==='weekly'?7:14;
  h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap">';
  [['list','List'],['agenda','Agenda'],['daily','Day'],['weekly','Week'],['twoweek','2 Weeks']].forEach(function(v){
    var ac=_mtView===v[0];
    h+='<button onclick="_mtView=\''+v[0]+'\';_mtOffset=0;rerender(\'mytasks\',true)" '
      +'style="font-family:var(--fM);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;cursor:pointer;'
      +'background:'+(ac?'var(--ink)':'none')+';color:'+(ac?'#F5F0E8':'var(--ink2)')
      +';border:1px solid '+(ac?'var(--ink)':'var(--line)')+'" >'+v[1]+'</button>';
  });
  if(_mtView!=='list'){
    h+='<div style="width:1px;height:22px;background:var(--line);margin:0 4px"></div>';
    h+='<button class="btn" onclick="_mtOffset-='+step+';rerender(\'mytasks\',true)">&#8592;</button>'
      +'<button class="btn" onclick="_mtOffset=0;rerender(\'mytasks\',true)\">Today</button>'
      +'<button class="btn" onclick="_mtOffset+='+step+';rerender(\'mytasks\',true)">&#8594;</button>';
  }
  h+='</div>';

  /* ── Views ── */
  if(_mtView==='list'){
    h+='<div style="font-family:var(--fM);font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px">Open</div>';
    h+=open.length
      ? open.map(function(it){ return mcTaskCard(it,statusMap); }).join('')
      : '<div style="font-family:var(--fM);font-size:10px;color:var(--mute);padding:12px 0">No open tasks from your agent right now.</div>';
    if(done.length){
      h+='<div style="font-family:var(--fM);font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);margin:22px 0 10px">Completed</div>';
      h+=done.map(function(it){ return mcTaskCard(it,statusMap); }).join('');
    }
  } else if(_mtView==='daily'){
    h+=mcDayView(calItems, today, startDate, typeColor);
  } else if(_mtView==='weekly'){
    h+=mcWeekView(calItems, today, startDate, 7, typeColor);
  } else if(_mtView==='twoweek'){
    h+=mcWeekView(calItems, today, startDate, 14, typeColor);
  } else {
    // agenda (default non-list)
    h+=mtAgendaView(calItems, today, items, statusMap, normSt);
  }

  h+='</div>';
  el.innerHTML=h;
}

/* ── Agenda view for tasks (shows task cards, not just chips) ── */
function mtAgendaView(calItems, today, rawItems, statusMap, normSt){
  var todayStr = mcDateStr(today);
  var byDate={};
  calItems.forEach(function(e){
    if(!byDate[e.date]) byDate[e.date]=[];
    byDate[e.date].push(e);
  });
  var dates = Object.keys(byDate).sort();
  if(!dates.length) return '<div style="font-family:var(--fM);font-size:12px;color:var(--mute);padding:40px 0;text-align:center">No tasks with due dates set.</div>';

  var h='';
  dates.forEach(function(ds){
    var d = new Date(ds+'T00:00:00');
    var dl= Math.round((d-today)/86400000);
    var isToday = ds===todayStr;
    var isPast  = dl<0;

    h+='<div style="display:flex;gap:16px;margin-bottom:4px;align-items:flex-start">'
      +'<div style="min-width:80px;padding-top:14px;flex-shrink:0">'
        +'<div style="font-family:var(--fM);font-size:9px;font-weight:700;color:'+(isToday?'var(--gold)':isPast?'var(--burg)':'var(--ink)')+';text-transform:uppercase;letter-spacing:.06em">'
          +(isToday?'Today':isPast?'Past':'')+' '+d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
        +'</div>'
        +'<div style="font-family:var(--fM);font-size:8px;color:var(--mute)">'+(isToday?'Due today':isPast?Math.abs(dl)+'d ago':'In '+dl+'d')+'</div>'
      +'</div>'
      +'<div style="flex:1;border-left:2px solid '+(isToday?'var(--gold)':isPast?'var(--burg)':'var(--line)')+';padding-left:16px;padding-bottom:12px">';

    byDate[ds].forEach(function(ci){
      // Find matching raw item for full task card
      var raw = rawItems.find(function(it){ return 'task_'+it.uid===ci.id; });
      if(raw){
        h+=mcTaskCard(raw, statusMap);
      } else {
        // Fallback chip
        h+='<div style="border:1px solid var(--line);border-left:3px solid var(--gold);padding:10px 14px;margin-bottom:5px;background:var(--paper)">'
          +'<div style="font-family:var(--fD);font-size:16px;color:var(--ink)">'+esc(ci.title)+(ci.time?' <span style="font-family:var(--fM);font-size:9px;color:var(--gold)">\u23F0 '+esc(ci.time)+'</span>':'')+'</div>'
        +'</div>';
      }
    });
    h+='</div></div>';
  });
  return h;
}

function mcTaskCard(it, statusMap){
  var t = it.t;
  var cat=t[0], title=t[1], note=t[2], ownerKey=t[3], due=t[5], time=t[6], action=t[7], output=t[8], agentNote=t[9];
  var rawStatus = statusMap[it.uid] || t[4] || 'not_started';
  // Normalise legacy 'done'/'open' to new 4-stage
  var normStatus = {done:'completed',completed:'completed',in_progress:'in_progress',on_hold:'on_hold'}[rawStatus] || 'not_started';
  var isDone = normStatus==='completed';
  var owner = (TEAM[ownerKey]&&TEAM[ownerKey].name) || ownerKey;
  var cm = tbCatMetaM(cat);
  var st = MDV_STATUSES.find(function(s){ return s.key===normStatus; }) || MDV_STATUSES[0];
  var isOpen = _mcOpenId === it.uid;

  var h = '<div style="border:1px solid var(--line);border-left:3px solid '+(isDone?'var(--sage)':'var(--gold)')+';margin-bottom:8px;background:var(--paper)'+(isDone?';opacity:.7':'')+'">';

  /* ── Header ── */
  h += '<div onclick="_mcOpenId=\''+it.uid+'\';rerender(\'mytasks\')" style="display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer">';
  h += mkAv(whoKey, 26);
  h += '<div style="flex:1;min-width:0">';
  h +=   '<div style="font-family:var(--fD);font-size:17px;'+(isDone?'text-decoration:line-through;color:var(--mute)':'')+'">'+esc(title)+'</div>';
  h +=   (note?'<div style="font-family:var(--fM);font-size:9px;color:var(--mute);margin-top:2px">'+esc(note)+'</div>':'');
  h += '</div>';
  h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">';
  h +=   '<div style="font-family:var(--fM);font-size:8px;color:var(--mute)">'+esc(due)+(time?' \u00b7 '+esc(time):'')+'</div>';
  h +=   mcStatusBadge(normStatus);
  h += '</div>';
  h += '<span style="font-family:var(--fM);font-size:12px;color:var(--mute);flex-shrink:0;margin-left:4px">'+(isOpen?'\u25b4':'\u25be')+'</span>';
  h += '</div>'; /* header */

  /* ── Expanded detail ── */
  if(isOpen){
    h += '<div style="border-top:1px solid var(--line);padding:14px 16px;background:var(--ivory)">';
    h += '<table style="width:100%;border-collapse:collapse;font-family:var(--fM);font-size:10px;margin-bottom:14px">';
    h += '<tr><td style="padding:7px 12px;border:1px solid var(--line);background:var(--goldp);color:var(--gold);font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;width:130px">Action Required</td><td style="padding:7px 12px;border:1px solid var(--line);color:var(--ink2)">'+esc(action||'\u2014')+'</td></tr>';
    h += '<tr><td style="padding:7px 12px;border:1px solid var(--line);background:var(--goldp);color:var(--gold);font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600">Expected Output</td><td style="padding:7px 12px;border:1px solid var(--line);color:var(--ink2)">'+esc(output||'\u2014')+'</td></tr>';
    h += '<tr><td style="padding:7px 12px;border:1px solid var(--line);background:var(--goldp);color:var(--gold);font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600">Agent Note</td><td style="padding:7px 12px;border:1px solid var(--line);font-family:var(--fD);font-style:italic;font-size:13px;color:var(--ink2)">'+(agentNote?'\u201c'+esc(agentNote)+'\u201d \u2014 '+esc(owner):'\u2014')+'</td></tr>';
    h += '<tr><td style="padding:7px 12px;border:1px solid var(--line);background:var(--goldp);color:var(--gold);font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600">Due</td><td style="padding:7px 12px;border:1px solid var(--line);color:var(--ink2)">'+esc(due)+(time?' at '+esc(time):'')+'</td></tr>';
    h += '</table>';

    h += '<div style="font-family:var(--fM);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px">Update Status</div>';
    h += mcStatusPicker(it.uid, normStatus, 'mcSetTaskStatus');

    h += '<div style="margin-top:14px"><button onclick="event.stopPropagation();_mcOpenId=null;rerender(\'mytasks\')" style="font-family:var(--fM);font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;background:none;border:1px solid var(--line);color:var(--mute);cursor:pointer">Close</button></div>';
    h += '</div>';
  }

  h += '</div>';
  return h;
}


function timeOptions(selected){
  var times=[];
  ['AM','PM'].forEach(function(p){for(var h=0;h<12;h++){var hr=h===0?12:h;['00','15','30','45'].forEach(function(m){times.push(hr+':'+m+' '+p);});}});
  return times.map(function(t){return '<option value="'+t+'"'+(t===selected?' selected':'')+'>'+t+'</option>';}).join('');
}
function timeSel(id,val,extraStyle){
  return '<select id="'+id+'" class="f-inp"'+(extraStyle?' style="'+extraStyle+'"':'')+'>'+timeOptions(val||'')+'</select>';
}

function saveCriticalAlert(modelKey){
  var msg = (document.getElementById('_ca-msg')||{}).value||'';
  if(!msg.trim()){ toast('Please enter a message'); return; }
  var date = (document.getElementById('_ca-date')||{}).value||'';
  var priority = (document.getElementById('_ca-priority')||{}).value||'burg';
  var d = loadCriticalAlerts();
  if(!d[modelKey]) d[modelKey]=[];
  d[modelKey].push({
    message: msg.trim(),
    date: date,
    priority: priority,
    addedAt: new Date().toISOString().slice(0,10),
    addedBy: whoKey
  });
  saveCriticalAlerts(d);
  closeModal();
  toast('\u2713 Critical alert added for '+(MODELS[modelKey]&&MODELS[modelKey].name||modelKey));
}

function deleteCriticalAlert(modelKey, index){
  var d = loadCriticalAlerts();
  if(!d[modelKey]) return;
  d[modelKey].splice(index, 1);
  saveCriticalAlerts(d);
  openCriticalAlertModal(modelKey);
}

/* ════════════════════════════════════════════════════════════════
   AGENT: buildCriticalAlerts — full card set
════════════════════════════════════════════════════════════════ */
function buildCriticalAlerts(){
  var alerts = [];
  var now = new Date(); now.setHours(0,0,0,0);

  function daysUntil(dateStr){
    if(!dateStr) return null;
    var d = new Date(dateStr+'T00:00:00');
    if(isNaN(d.getTime())) return null;
    return Math.round((d-now)/86400000);
  }

  // 1. Critical messages assigned to models
  try{
    var critAlerts = loadCriticalAlerts();
    Object.keys(critAlerts).forEach(function(modelKey){
      var m = MODELS[modelKey]; if(!m) return;
      (critAlerts[modelKey]||[]).forEach(function(a){
        // Skip expired alerts (expiry date in the past)
        if(a.date){ var dl=daysUntil(a.date); if(dl!==null && dl<0) return; }
        alerts.push({
          type:'CRITICAL',
          tone: a.priority||'burg',
          cd: a.date ? (daysUntil(a.date)===0?'Today':daysUntil(a.date)<0?'Overdue':'By '+a.date) : 'Urgent',
          cdNow: true,
          title: esc(m.name) + ' \u2014 Critical',
          date: a.date||a.addedAt||'',
          body: esc(a.message),
          sortKey: -999
        });
      });
    });
  }catch(e){}

  // 2. Upcoming travel events from calendar
  try{
    var cal = loadCal();
    cal.forEach(function(ev){
      if((ev.type||'').toLowerCase()!=='travel') return;
      var dl = daysUntil(ev.date);
      if(dl===null || dl<0 || dl>30) return;
      var modelName = ev.model && MODELS[ev.model] ? MODELS[ev.model].name : '';
      alerts.push({
        type: 'TRAVEL',
        tone: dl<=3?'burg':'gold',
        cd: dl===0?'Today':dl===1?'Tomorrow':'In '+dl+'d',
        cdNow: dl<=3,
        title: esc(ev.title||'Travel') + (modelName?' \u2014 '+esc(modelName):''),
        date: ev.date,
        body: esc(ev.client||ev.notes||''),
        sortKey: dl
      });
    });
  }catch(e){}

  // 3. Important dates from calendar (Fashion Week, Haute Couture, NYFW etc.)
  try{
    var cal2 = loadCal();
    var importantTypes = ['Fashion Week','Couture','NYFW','Season','Deadline','Press','Event'];
    cal2.forEach(function(ev){
      var dl = daysUntil(ev.date);
      if(dl===null || dl<-3 || dl>21) return;
      var isImportant = importantTypes.some(function(t){ return (ev.title+' '+(ev.type||'')).toLowerCase().indexOf(t.toLowerCase())>-1; });
      if(!isImportant) return;
      // Avoid duplicates from travel
      if((ev.type||'').toLowerCase()==='travel') return;
      var modelName = ev.model && MODELS[ev.model] ? MODELS[ev.model].name : '';
      alerts.push({
        type: dl<0?'PAST EVENT':'KEY DATE',
        tone: dl<0?'burg':(dl<=3?'gold':'sage'),
        cd: dl<0?Math.abs(dl)+'d ago':(dl===0?'Today':'In '+dl+'d'),
        cdNow: dl<=1,
        title: esc(ev.title||(ev.type||'Event')),
        date: ev.date,
        body: modelName?esc(modelName):'',
        sortKey: dl<0 ? dl-1000 : dl
      });
    });
  }catch(e){}

  // 4. Visa / passport expirations within 90 days
  try{
    var visaAll = typeof loadVisaData==='function' ? loadVisaData() : {};
    Object.keys(visaAll).forEach(function(modelKey){
      var v = visaAll[modelKey]||{}; var m = MODELS[modelKey]; if(!m) return;
      [['passportExpiry','Passport'],['usVisaExpiry','US Visa'],['schengenExpiry','Schengen Visa']].forEach(function(f){
        var dt = v[f[0]]; if(!dt) return;
        var dleft = daysUntil(dt);
        if(dleft===null || dleft>90) return;
        alerts.push({
          type: dleft<0?'EXPIRED':'EXPIRING',
          tone: dleft<0?'burg':(dleft<=30?'burg':'gold'),
          cd: dleft<0?(Math.abs(dleft)+'d ago'):(dleft===0?'Today':'In '+dleft+'d'),
          cdNow: dleft<=7,
          title: esc(m.name)+' \u2014 '+f[1],
          date: dt,
          body: dleft<0?f[1]+' EXPIRED. Renew immediately.':f[1]+' expiring \u2014 flag for renewal.',
          sortKey: dleft
        });
      });
    });
  }catch(e){}

  // 5. Unconfirmed bookings in next 7 days
  try{
    var cal3 = loadCal();
    cal3.forEach(function(ev){
      var dl = daysUntil(ev.date);
      if(dl===null || dl<0 || dl>7) return;
      if(ev.confirmed) return;
      var modelName = ev.model && MODELS[ev.model] ? MODELS[ev.model].name : '';
      alerts.push({
        type:'UNCONFIRMED',
        tone: dl<=2?'burg':'gold',
        cd: dl===0?'Today':'In '+dl+'d',
        cdNow: dl<=2,
        title: esc(ev.title||ev.type||'Booking')+(modelName?' \u2014 '+esc(modelName):''),
        date: ev.date,
        body: (ev.client?esc(ev.client)+' \u2014 ':'')+'Not confirmed. Follow up now.',
        sortKey: dl+10
      });
    });
  }catch(e){}

  // 6. Overdue + due-soon Model x Agent Schedule tasks
  try{
    var schedule = typeof loadSchedule==='function' ? loadSchedule() : [];
    var statusMap = typeof loadTaskStatus==='function' ? loadTaskStatus() : {};
    schedule.forEach(function(mm){
      mm.wks.forEach(function(wk,wi){
        wk.t.forEach(function(t,ti){
          var uid=mm.id+'-w'+wi+'t'+ti;
          var status = statusMap[uid]||t[4];
          if(status==='done'||status==='completed') return;
          if(!t[5]) return;
          var dl = daysUntil(t[5]);
          if(dl===null || dl>3) return;
          var ownerName = (TEAM[t[3]]&&TEAM[t[3]].name)||t[3]||'';
          alerts.push({
            type: dl<0?'PAST DUE':'DUE SOON',
            tone: dl<0?'burg':(dl===0?'burg':'gold'),
            cd: dl<0?(Math.abs(dl)+'d overdue'):(dl===0?'Today':'In '+dl+'d'),
            cdNow: dl<=0,
            title: esc(mm.name)+' \u2014 '+esc(t[1]),
            date: t[5],
            body: 'Owner: '+esc(ownerName),
            sortKey: dl+20
          });
        });
      });
    });
  }catch(e){}

  alerts.sort(function(a,b){ return a.sortKey - b.sortKey; });
  return alerts.slice(0, 20);
}

function buildCriticalAlertsModel(){
  var alerts = [];
  var now = new Date(); now.setHours(0,0,0,0);
  function dl(dateStr){
    if(!dateStr) return null;
    var d = new Date(dateStr+'T00:00:00');
    if(isNaN(d.getTime())) return null;
    return Math.round((d-now)/86400000);
  }

  // 1. Critical messages sent by the agency specifically for this model
  try{
    var critAlerts = JSON.parse(localStorage.getItem(CRITICAL_ALERTS_KEY)||'{}');
    var myAlerts = critAlerts[whoKey]||[];
    myAlerts.forEach(function(a){
      if(a.date){ var dleft=dl(a.date); if(dleft!==null && dleft<0) return; }
      alerts.push({
        type: 'AGENCY ALERT',
        tone: a.priority||'burg',
        cd: a.date?(dl(a.date)===0?'Today':dl(a.date)<0?'Overdue':'By '+a.date):'Urgent',
        cdNow: true,
        title: esc(a.message),
        date: a.date||'',
        body: 'From: '+esc((TEAM[a.addedBy]&&TEAM[a.addedBy].name)||'MDV Agency'),
        sortKey: -999
      });
    });
  }catch(e){}

  // 2. Upcoming travel from calendar (this model only)
  try{
    var cal = loadCal();
    cal.forEach(function(ev){
      if(ev.model!==whoKey && (ev.models||[]).indexOf(whoKey)<0) return;
      if((ev.type||'').toLowerCase()!=='travel') return;
      var dleft = dl(ev.date);
      if(dleft===null || dleft<-1 || dleft>30) return;
      alerts.push({
        type: 'TRAVEL',
        tone: dleft<=3?'burg':'gold',
        cd: dleft<0?Math.abs(dleft)+'d ago':(dleft===0?'Today':dleft===1?'Tomorrow':'In '+dleft+'d'),
        cdNow: dleft<=3,
        title: esc(ev.title||'Travel'),
        date: ev.date,
        body: esc(ev.client||ev.notes||''),
        sortKey: dleft
      });
    });
  }catch(e){}

  // 3. Important / key dates from calendar (this model only)
  try{
    var cal2 = loadCal();
    cal2.forEach(function(ev){
      if(ev.model!==whoKey && (ev.models||[]).indexOf(whoKey)<0) return;
      if((ev.type||'').toLowerCase()==='travel') return;
      var dleft = dl(ev.date);
      if(dleft===null || dleft<-3 || dleft>21) return;
      var dup = alerts.some(function(a){ return a.title===esc(ev.title||''); });
      if(dup) return;
      alerts.push({
        type: dleft<0?'PAST':'UPCOMING',
        tone: dleft<0?'burg':(dleft<=2?'gold':'sage'),
        cd: dleft<0?Math.abs(dleft)+'d ago':(dleft===0?'Today':dleft===1?'Tomorrow':'In '+dleft+'d'),
        cdNow: dleft<=1,
        title: esc(ev.title||ev.type||'Event'),
        date: ev.date,
        body: esc(ev.client||''),
        sortKey: dleft
      });
    });
  }catch(e){}

  // 4. Open tasks from schedule (this model only)
  try{
    var reqs = typeof loadModelRequestsM==='function' ? loadModelRequestsM() : {};
    var stmap = typeof loadTaskStatusM==='function' ? loadTaskStatusM() : {};
    var sch = typeof loadScheduleM==='function' ? loadScheduleM() : [];
    var mm = sch.find(function(x){return x.id===whoKey;});
    if(mm){
      mm.wks.forEach(function(wk,wi){
        wk.t.forEach(function(t,ti){
          var uid=mm.id+'-w'+wi+'t'+ti;
          if(!reqs[uid]) return;
          var status = stmap[uid]||t[4];
          if(status==='done'||status==='completed') return;
          var dleft = dl(t[5]);
          if(dleft===null || dleft>7) return;
          alerts.push({
            type: dleft<0?'OVERDUE':'TASK DUE',
            tone: dleft<0?'burg':(dleft<=2?'burg':'gold'),
            cd: dleft<0?(Math.abs(dleft)+'d overdue'):(dleft===0?'Today':'In '+dleft+'d'),
            cdNow: dleft<=2,
            title: esc(t[1]),
            date: t[5],
            body: 'Assigned by: '+esc((TEAM[t[3]]&&TEAM[t[3]].name)||t[3]||''),
            sortKey: dleft+50
          });
        });
      });
    }
  }catch(e){}

  if(!alerts.length){
    alerts.push({type:'MDV AGENCY',tone:'sage',cd:'Active',cdNow:false,
      title:'Season is live',date:'',
      body:'Your agent will send critical messages, travel dates, and task alerts here.',sortKey:999});
  }
  alerts.sort(function(a,b){ return a.sortKey-b.sortKey; });
  return alerts.slice(0,12);
}

function initAlertSlider(sliderEl){
  if(!sliderEl) return;
  var isPaused = false;
  var cardW = 270; // approx card width + gap
  sliderEl.addEventListener('mouseenter', function(){ isPaused=true; });
  sliderEl.addEventListener('mouseleave', function(){ isPaused=false; });
  sliderEl.addEventListener('touchstart', function(){ isPaused=true; }, {passive:true});
  var interval = setInterval(function(){
    if(isPaused) return;
    var maxScroll = sliderEl.scrollWidth - sliderEl.clientWidth;
    if(maxScroll<=0) return;
    if(sliderEl.scrollLeft >= maxScroll - 10){
      sliderEl.scrollLeft = 0;
    } else {
      sliderEl.scrollLeft += cardW;
    }
  }, 4000);
}

      +'<input class="f-inp" id="_mg-g'+i+'" value="'+esc(g)+'" style="flex:1" placeholder="Goal '+(i+1)+'">'
      +'<button onclick="this.parentNode.remove()" style="font-family:var(--fM);font-size:11px;background:none;border:1px solid var(--line);padding:0 10px;cursor:pointer;color:var(--mute)">\u00d7</button>'

function mgAddRow(){

    +'<button onclick="this.parentNode.remove()" style="font-family:var(--fM);font-size:11px;background:none;border:1px solid var(--line);padding:0 10px;cursor:pointer;color:var(--mute)">\u00d7</button>';

/* ════════════════════════════════════════════════════════════════
   MODEL CALENDAR — Full rebuild: Agenda · Day · Week · 2 Weeks
════════════════════════════════════════════════════════════════ */
function renderModelCalendar(el){
  var cal = [];
  try{ cal = loadCal(); }catch(e){ cal=[]; }
  var myCal = cal.filter(function(e){
    return (e.model===whoKey || (e.models||[]).indexOf(whoKey)>-1) && e.visibleToModel!==false;
  });
  // myCal already IS every real, current task about this model — it comes
  // straight from the unified Agency Workshop data, with real ids that
  // open correctly. Two older, separate sources used to be merged in on
  // top of this: the legacy Model x Agent Schedule system, and a second,
  // redundant direct query against Agency Workshop tasks. Both generated
  // synthetic ids ('task_...', 'at_...') that never matched a real task,
  // so clicking those specific items could never open anything — and the
  // legacy ones showed with their own separate "Open Task" red label,
  // which had nothing to do with the real, unified booking data. Models
  // only need to see the one real thing they were actually sent.
  var allItems = myCal;

  var today = new Date(); today.setHours(0,0,0,0);
  var startDate = new Date(today); startDate.setDate(startDate.getDate()+_mcOffset);

  var typeColor = function(type){
    var map={Travel:'var(--burg)',Casting:'var(--gold)',Editorial:'var(--sage)',
              Fitting:'var(--ink)',Show:'#8B5E83',Task:'var(--burg)',Deadline:'var(--burg)',
              Meeting:'var(--gold)',Training:'var(--sage)',Test:'var(--ink2)',Other:'var(--mute)',
              Job:'var(--gold)',Booking:'var(--gold)',Movement:'var(--burg)','Daily Agenda':'var(--mute)','Weekly Submission':'var(--mute)'};
    return map[type]||'var(--gold)';
  };

  /* ── Toolbar ── */
  var h='<div class="ph"><h1 class="ph-h1">My <em>Calendar</em></h1>'
    +'<div class="ph-sub">Your bookings, castings, deadlines, and tasks.</div></div><div class="cnt">';

  var pending = myCal.filter(function(e){ return e.confirmed===false; });
  if(pending.length){
    h+='<div style="border:1px solid var(--goldl);background:var(--goldp);padding:16px 18px;margin-bottom:20px">'
      +'<div style="font-family:var(--fM);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px">Needs Your Confirmation ('+pending.length+')</div>';
    pending.forEach(function(e){
      h+='<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06)">'
        +'<div style="min-width:0">'
          +'<div style="font-family:var(--fD);font-size:15px;color:var(--ink)">'+esc(e.title||'Booking')+'</div>'
          +'<div style="font-family:var(--fM);font-size:9.5px;color:var(--mute);margin-top:2px">'+(e.type?esc(e.type)+' \u00b7 ':'')+(e.date||'')+(e.time?' \u00b7 '+esc(e.time):'')+'</div>'
        +'</div>'
        +'<div style="display:flex;gap:6px;flex-shrink:0">'
          +'<button onclick="respondToEvent(\''+esc(e.id)+'\',true)" style="font-family:var(--fM);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;background:var(--sage);border:none;color:#fff;cursor:pointer">Confirm</button>'
          +'<button onclick="respondToEvent(\''+esc(e.id)+'\',false)" style="font-family:var(--fM);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;background:none;border:1px solid var(--burg);color:var(--burg);cursor:pointer">Decline</button>'
        +'</div>'
      +'</div>';
    });
    h+='</div>';
  }

  h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap">';
  [['agenda','Agenda'],['daily','Day'],['twoday','2 Day'],['weekly','Week'],['monthly','Month']].forEach(function(v){
    var active=_mcView===v[0];
    h+='<button onclick="_mcView=\''+v[0]+'\';_mcOffset=0;rerender(\'mycalendar\',true)" '
      +'style="font-family:var(--fM);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:8px 16px;cursor:pointer;'
      +'background:'+(active?'var(--ink)':'none')+';color:'+(active?'#F5F0E8':'var(--ink2)')
      +';border:1px solid '+(active?'var(--ink)':'var(--line)')+'">'+v[1]+'</button>';
  });
  h+='<div style="width:1px;height:22px;background:var(--line);margin:0 4px"></div>';
  var step=(_mcView==='daily'?1:_mcView==='twoday'?2:_mcView==='weekly'?7:_mcView==='monthly'?30:7);
  h+='<button class="btn" onclick="_mcOffset-='+step+';rerender(\'mycalendar\',true)">&#8592;</button>'
    +'<button class="btn" onclick="_mcOffset=0;rerender(\'mycalendar\',true)\">Today</button>'
    +'<button class="btn" onclick="_mcOffset+='+step+';rerender(\'mycalendar\',true)">&#8594;</button>';
  h+='</div>';

  /* ── Views ── */
  if(_mcView==='daily')   h+=mcDayView(allItems, today, startDate, typeColor);
  else if(_mcView==='twoday') h+=mc2DayView(allItems, today, startDate, typeColor);
  else if(_mcView==='weekly') h+=mcWeekView(allItems, today, startDate, 7, typeColor);
  else if(_mcView==='monthly') h+=mcMonthView(allItems, today, startDate, typeColor);
  else h+=mcAgendaView(allItems, today, typeColor);

  h+='</div>';
  el.innerHTML=h;
}

function mcFmtDate(d){
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function mcDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mcAddDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }

function setMyTaskStatus(taskId, status){
  var tasks = loadAgentTasks();
  var t = tasks.find(function(x){ return x.id===taskId; });
  if(!t) return;
  var STATUS_LABELS = {open:'Not Started', in_progress:'In Progress', on_hold:'On Hold', done:'Completed'};
  t.status = status;
  saveAgentTasks(tasks);
  if(typeof addNotif==='function' && t.fromKey){
    addNotif('status_update', (MODELS[whoKey]&&MODELS[whoKey].name||whoKey)+' updated: '+(t.title||'a task'),
      'Now: '+(STATUS_LABELS[status]||status), {fromKey:whoKey, toKey:t.fromKey, link:'agentTasks'});
  }
  showEventDetail(taskId); // refresh the modal in place so the stamp reflects instantly
  toast('\u2713 Marked '+(STATUS_LABELS[status]||status).toLowerCase());
}
function showEventDetail(id){
  var task = loadAgentTasks().find(function(t){ return t.id===id; });
  if(!task) return;
  var _existingModal = document.getElementById('_modal'); if(_existingModal) _existingModal.remove();
  var bg = document.createElement('div');
  bg.className='modal-bg'; bg.id='_modal';
  bg.onclick=function(e){ if(e.target===bg) bg.remove(); };

  var fromN = (TEAM[task.fromKey]&&TEAM[task.fromKey].name) || task.fromKey || 'Agency';
  var toN = (TEAM[task.toKey]&&TEAM[task.toKey].name) || task.toKey || 'Unassigned';
  var statusLabel = task.confirmed===true?'Confirmed':task.confirmed===false?'Awaiting Your Confirmation':'\u2014';
  var statusColor = task.confirmed===true?'var(--sage)':task.confirmed===false?'var(--gold)':'var(--mute)';

  function row(label, value){
    if(!value) return '';
    return '<div style="padding:10px 0;border-bottom:1px solid var(--line)">'
      +'<div style="font-family:var(--fM);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-bottom:4px">'+label+'</div>'
      +'<div style="font-family:var(--fD);font-size:15px;color:var(--ink)">'+esc(String(value))+'</div>'
    +'</div>';
  }

  // ── Status stamps — a model's own progress update on a task, written
  // straight into the exact status field an agent already watches on the
  // Agency Workshop board. No separate system, no translation step —
  // tap a stamp here, and it's the same change an agent would see if
  // they updated it themselves.
  var STAMPS = [
    {v:'open',        label:'Not Started', mark:'&#9675;', tilt:-2, color:'var(--mute)'},
    {v:'in_progress', label:'In Progress', mark:'&#9686;', tilt:1.5, color:'var(--gold)'},
    {v:'on_hold',     label:'On Hold',     mark:'&#10074;&#10074;', tilt:-1, color:'var(--burg)'},
    {v:'done',        label:'Completed',   mark:'&#10003;', tilt:2, color:'var(--sage)'}
  ];
  function stampRow(){
    var cur = task.status || 'open';
    var s = '<div style="padding:14px 0 4px;border-bottom:1px solid var(--line)">'
      +'<div style="font-family:var(--fM);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-bottom:12px">Keep Your Agent Updated</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding-bottom:10px">';
    STAMPS.forEach(function(st){
      var active = cur===st.v;
      s+='<div onclick="setMyTaskStatus(\''+esc(task.id)+'\',\''+st.v+'\')" '
        +'style="cursor:pointer;text-align:center;padding:10px 4px;border:2px solid '+(active?st.color:'var(--line)')+';'
        +'background:'+(active?st.color:'var(--paper)')+';border-radius:2px;'
        +'transform:rotate('+(active?st.tilt:0)+'deg);transition:transform .15s, background .15s;'
        +'box-shadow:'+(active?'inset 0 0 0 1px rgba(255,255,255,.3), 2px 3px 6px rgba(0,0,0,.15)':'none')+'">'
        +'<div style="font-size:18px;line-height:1;color:'+(active?'#fff':st.color)+';margin-bottom:5px">'+st.mark+'</div>'
        +'<div style="font-family:var(--fM);font-size:7px;letter-spacing:.06em;text-transform:uppercase;color:'+(active?'#fff':'var(--ink2)')+'">'+st.label+'</div>'
      +'</div>';
    });
    s+='</div></div>';
    return s;
  }

  var h = '<div class="modal" style="max-width:520px;width:94vw;max-height:90vh;overflow-y:auto">'
    +'<button class="modal-x" onclick="closeModal()">\u00d7</button>'
    +'<div class="m-hd">'
      +'<div class="m-eye">'+esc(task.category||'Task')+'</div>'
      +'<div class="m-title">'+esc(task.title||'Untitled')+'</div>'
    +'</div>'
    +'<div class="m-bd">'
      +'<div style="display:inline-block;font-family:var(--fM);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:'+statusColor+';border:1px solid '+statusColor+';padding:4px 10px;margin-bottom:12px">'+statusLabel+'</div>'
      +row('Date', task.due ? new Date(task.due+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}) : '')
      +row('Time', task.time + (task.endTime ? ' \u2013 '+task.endTime : ''))
      +row('Type', task.category)
      +row('Sent By', fromN)
      +row('Assigned Agent', toN)
      +row('Location', task.loc)
      +row('Client', task.client)
      +(task.notes ? '<div style="padding:10px 0;border-bottom:1px solid var(--line)">'
          +'<div style="font-family:var(--fM);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-bottom:4px">Notes</div>'
          +'<div style="font-family:var(--fM);font-size:12px;color:var(--ink2);line-height:1.6">'+esc(task.notes)+'</div>'
        +'</div>' : '')
      +(task.confirmed!==false ? stampRow() : '')
    +'</div>'
    +(task.confirmed===false ? '<div class="m-ft">'
        +'<button class="btn pri" onclick="respondToEvent(\''+esc(task.id)+'\',true);closeModal()" style="background:var(--sage);border-color:var(--sage)">Confirm</button>'
        +'<button class="btn" onclick="respondToEvent(\''+esc(task.id)+'\',false);closeModal()" style="border-color:var(--burg);color:var(--burg)">Decline</button>'
      +'</div>' : '')
  +'</div>';

  bg.innerHTML = h;
  document.body.appendChild(bg);
}

function mcAgendaView(items, today, typeColor){
  var h='';
  // Group by date, show next 60 days
  var days={};
  items.forEach(function(e){
    if(!days[e.date]) days[e.date]=[];
    days[e.date].push(e);
  });
  var dates=Object.keys(days).filter(function(d){ return d>=mcDateStr(today); }).sort();
  if(!dates.length){
    return '<div style="font-family:var(--fM);font-size:12px;color:var(--mute);padding:40px 0;text-align:center">No upcoming events or tasks.</div>';
  }
  dates.forEach(function(dateStr){
    var dObj=new Date(dateStr+'T00:00:00');
    var dl=Math.round((dObj-today)/86400000);
    var isToday=dl===0;
    h+='<div style="display:flex;gap:16px;margin-bottom:4px;align-items:flex-start">'
      +'<div style="min-width:96px;padding-top:14px;flex-shrink:0">'
        +'<div style="font-family:var(--fM);font-size:10px;font-weight:700;color:'+(isToday?'var(--gold)':'var(--ink)')+';text-transform:uppercase;letter-spacing:.06em">'
          +(isToday?'TODAY ':'')+dObj.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
        +'</div>'
        +(dl>0?'<div style="font-family:var(--fM);font-size:8px;color:var(--mute)">In '+dl+'d</div>':'')
      +'</div>'
      +'<div style="flex:1;border-left:2px solid '+(isToday?'var(--gold)':'var(--line)')+';padding-left:16px;padding-bottom:12px">';
    days[dateStr].sort(function(a,b){return (a.time||'')>(b.time||'')?1:-1;}).forEach(function(e){
      var tc=typeColor(e.type||'Other');
      h+='<div onclick="showEventDetail(\''+esc(e.id)+'\')" style="cursor:pointer;border:1px solid var(--line);border-left:3px solid '+tc+';padding:10px 14px;margin-bottom:6px;background:var(--paper)">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
          +'<span style="font-family:var(--fD);font-size:16px;color:var(--ink)">'+esc(e.title||e.type||'Event')+'</span>'
          +'<span style="font-family:var(--fM);font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:'+tc+';background:rgba(0,0,0,.04);padding:2px 8px">'+esc(e.type||'')+'</span>'
        +'</div>'
        +(e.time?'<div style="font-family:var(--fM);font-size:9px;color:var(--gold)">\u23F0 '+esc(e.time)+'</div>':'')
        +(e.client?'<div style="font-family:var(--fM);font-size:9px;color:var(--mute);margin-top:3px">'+esc(e.client)+'</div>':'')
        +(e.notes?'<div style="font-family:var(--fM);font-size:10px;color:var(--ink2);margin-top:5px;line-height:1.5">'+esc(e.notes)+'</div>':'')
        +'</div>';
    });
    h+='</div></div>';
  });
  return h;
}

function mcDayView(items, today, startDate, typeColor){
  var dateStr = mcDateStr(startDate);
  var dayItems = items.filter(function(e){ return e.date===dateStr; })
    .sort(function(a,b){return (a.time||'')>(b.time||'')?1:-1;});
  var isToday = dateStr===mcDateStr(today);
  var h='<div style="font-family:var(--fM);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:'+(isToday?'var(--gold)':'var(--ink2)')+';margin-bottom:16px">'
    +(isToday?'Today \u2014 ':'')+startDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})
  +'</div>';
  if(!dayItems.length){
    h+='<div style="font-family:var(--fM);font-size:12px;color:var(--mute);padding:40px 0;text-align:center">Nothing scheduled for this day.</div>';
    return h;
  }
  // Timeline: hours 6–23
  var hours=[];
  for(var hr=6;hr<=23;hr++) hours.push(hr);
  var placed={};
  dayItems.forEach(function(e){
    var hr=e.time?parseInt(e.time.split(':')[0],10):null;
    if(e.time&&e.time.toLowerCase().indexOf('pm')>-1&&hr<12) hr+=12;
    if(e.time&&e.time.toLowerCase().indexOf('am')>-1&&hr===12) hr=0;
    var slot=hr!==null&&!isNaN(hr)?hr:null;
    if(slot!==null){ if(!placed[slot])placed[slot]=[]; placed[slot].push(e); }
    else{ if(!placed['all'])placed['all']=[]; placed['all'].push(e); }
  });
  // All-day items
  if(placed['all']){
    placed['all'].forEach(function(e){
      var tc=typeColor(e.type||'Other');
      h+='<div onclick="showEventDetail(\''+esc(e.id)+'\')" style="cursor:pointer;border:1px solid var(--line);border-left:3px solid '+tc+';padding:10px 14px;margin-bottom:8px;background:var(--paper)">'
        +'<div style="font-family:var(--fD);font-size:17px;color:var(--ink)">'+esc(e.title||e.type)+'</div>'
        +(e.client?'<div style="font-family:var(--fM);font-size:9px;color:var(--mute)">'+esc(e.client)+'</div>':'')
      +'</div>';
    });
  }
  // Hourly slots
  hours.forEach(function(hr){
    var label=(hr===0?'12 AM':hr<12?hr+' AM':hr===12?'12 PM':(hr-12)+' PM');
    h+='<div style="display:flex;gap:12px;align-items:flex-start;min-height:42px;border-top:1px solid var(--line)">'
      +'<div style="min-width:54px;padding-top:10px;font-family:var(--fM);font-size:8.5px;color:var(--mute);text-align:right;flex-shrink:0">'+label+'</div>'
      +'<div style="flex:1;padding-top:8px">';
    if(placed[hr]){
      placed[hr].forEach(function(e){
        var tc=typeColor(e.type||'Other');
        h+='<div onclick="showEventDetail(\''+esc(e.id)+'\')" style="cursor:pointer;border-left:3px solid '+tc+';padding:6px 12px;margin-bottom:5px;background:var(--paper);border:1px solid var(--line);border-left:3px solid '+tc+'">'
          +'<div style="font-family:var(--fD);font-size:15px;color:var(--ink)">'+esc(e.title||e.type)+'</div>'
          +(e.client?'<div style="font-family:var(--fM);font-size:9px;color:var(--mute)">'+esc(e.client)+'</div>':'')
        +'</div>';
      });
    }
    h+='</div></div>';
  });
  return h;
}

function mcWeekView(items, today, startDate, numDays, typeColor){
  var days=[];
  for(var d=0;d<numDays;d++) days.push(mcAddDays(startDate,d));
  var todayStr=mcDateStr(today);
  var h='<div style="display:grid;grid-template-columns:repeat('+Math.min(numDays,7)+',1fr);gap:6px;margin-bottom:8px">';
  // If 14 days, render two rows of 7
  var renderRow=function(daySlice){
    var r='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px">';
    daySlice.forEach(function(d){
      var ds=mcDateStr(d);
      var isToday=ds===todayStr;
      var dayItems=items.filter(function(e){return e.date===ds;})
        .sort(function(a,b){return (a.time||'')>(b.time||'')?1:-1;});
      r+='<div style="border:1px solid '+(isToday?'var(--gold)':'var(--line)')+';min-height:120px;background:var(--paper)">'
        +'<div style="padding:8px 10px 6px;border-bottom:1px solid var(--line);background:'+(isToday?'var(--gold)':'var(--ivory)'+';')+'">'
          +'<div style="font-family:var(--fM);font-size:8.5px;font-weight:700;color:'+(isToday?'#fff':'var(--ink)')+'">'
            +d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase()
          +'</div>'
          +'<div style="font-family:var(--fD);font-size:18px;color:'+(isToday?'#fff':'var(--ink)')+'">'+d.getDate()+'</div>'
        +'</div>'
        +'<div style="padding:6px">';
      dayItems.slice(0,4).forEach(function(e){
        var tc=typeColor(e.type||'Other');
        r+='<div onclick="showEventDetail(\''+esc(e.id)+'\')" style="cursor:pointer;font-family:var(--fM);font-size:9px;border-left:2px solid '+tc+';padding:3px 6px;margin-bottom:3px;background:rgba(0,0,0,.02);color:var(--ink);line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="'+esc(e.title||e.type)+'">'
          +esc((e.title||e.type||'Event').substring(0,22))+'</div>';
      });
      if(dayItems.length>4) r+='<div onclick="_mcView=\'daily\';_mcOffset='+Math.round((new Date(ds+'T00:00:00')-today)/86400000)+';rerender(\'mycalendar\',true)" style="cursor:pointer;font-family:var(--fM);font-size:8px;color:var(--gold);padding:2px 6px;text-decoration:underline">+'+( dayItems.length-4)+' more</div>';
      r+='</div></div>';
    });
    r+='</div>';
    return r;
  };
  h='';
  if(numDays===7){
    h=renderRow(days);
  } else {
    h=renderRow(days.slice(0,7))+renderRow(days.slice(7,14));
  }
  return h;
}

function mc2DayView(items, today, startDate, typeColor){
  var todayStr = mcDateStr(today);
  var days = [startDate, mcAddDays(startDate,1)];
  var hours = []; for(var hr=6; hr<=23; hr++) hours.push(hr);

  function dayColumn(d){
    var dateStr = mcDateStr(d);
    var isToday = dateStr===todayStr;
    var dayItems = items.filter(function(e){ return e.date===dateStr; })
      .sort(function(a,b){return (a.time||'')>(b.time||'')?1:-1;});
    var placed={};
    dayItems.forEach(function(e){
      var hrN=e.time?parseInt(e.time.split(':')[0],10):null;
      if(e.time&&e.time.toLowerCase().indexOf('pm')>-1&&hrN<12) hrN+=12;
      if(e.time&&e.time.toLowerCase().indexOf('am')>-1&&hrN===12) hrN=0;
      var slot=hrN!==null&&!isNaN(hrN)?hrN:'all';
      if(!placed[slot])placed[slot]=[]; placed[slot].push(e);
    });
    var c='<div style="flex:1;min-width:0">'
      +'<div style="font-family:var(--fM);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:'+(isToday?'var(--gold)':'var(--ink2)')+';padding:8px 10px;border-bottom:2px solid '+(isToday?'var(--gold)':'var(--line)')+';margin-bottom:6px">'
        +(isToday?'Today \u2014 ':'')+d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
      +'</div>';
    if(placed['all']){
      placed['all'].forEach(function(e){
        var tc=typeColor(e.type||'Other');
        c+='<div onclick="showEventDetail(\''+esc(e.id)+'\')" style="cursor:pointer;border:1px solid var(--line);border-left:3px solid '+tc+';padding:8px 10px;margin:0 8px 6px;background:var(--paper)">'
          +'<div style="font-family:var(--fM);font-size:7px;color:var(--mute);margin-bottom:2px">ALL DAY</div>'
          +'<div style="font-family:var(--fD);font-size:14px;color:var(--ink)">'+esc(e.title||e.type)+'</div>'
        +'</div>';
      });
    }
    hours.forEach(function(hrN){
      var label=(hrN===0?'12A':hrN<12?hrN+'A':hrN===12?'12P':(hrN-12)+'P');
      c+='<div style="display:flex;gap:6px;min-height:34px;border-top:1px solid var(--line);padding-left:8px">'
        +'<div style="min-width:26px;padding-top:6px;font-family:var(--fM);font-size:7.5px;color:var(--mute);flex-shrink:0">'+label+'</div>'
        +'<div style="flex:1;padding:4px 8px 4px 0">';
      if(placed[hrN]){
        placed[hrN].forEach(function(e){
          var tc=typeColor(e.type||'Other');
          c+='<div onclick="showEventDetail(\''+esc(e.id)+'\')" style="cursor:pointer;border:1px solid var(--line);border-left:2px solid '+tc+';padding:4px 8px;margin-bottom:3px;background:var(--paper);font-family:var(--fM);font-size:10px;color:var(--ink)">'+esc(e.title||e.type)+'</div>';
        });
      }
      c+='</div></div>';
    });
    return c+'</div>';
  }

  return '<div style="display:flex;gap:14px;align-items:flex-start">'+days.map(dayColumn).join('<div style="width:1px;background:var(--line);align-self:stretch"></div>')+'</div>';
}

function mcMonthView(items, today, startDate, typeColor){
  var todayStr = mcDateStr(today);
  // Snap to the 1st of the month, then find the Sunday on/before it
  var monthStart = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  var gridStart = mcAddDays(monthStart, -monthStart.getDay());
  var monthLabel = monthStart.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  var h='<div style="font-family:var(--fD);font-size:20px;color:var(--ink);margin-bottom:12px">'+monthLabel+'</div>';

  });
  h+='</div>';

  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
  for(var row=0; row<6; row++){
    for(var col=0; col<7; col++){
      var d = mcAddDays(gridStart, row*7+col);
      var ds = mcDateStr(d);
      var isToday = ds===todayStr;
      var inMonth = d.getMonth()===monthStart.getMonth();
      var dayItems = items.filter(function(e){ return e.date===ds; })
        .sort(function(a,b){return (a.time||'')>(b.time||'')?1:-1;});
      h+='<div style="border:1px solid '+(isToday?'var(--gold)':'var(--line)')+';min-height:84px;background:'+(inMonth?'var(--paper)':'var(--ivory)')+';padding:4px 5px;opacity:'+(inMonth?'1':'.45')+'">'
        +'<div style="font-family:var(--fD);font-size:13px;color:'+(isToday?'var(--gold)':'var(--ink)')+'">'+d.getDate()+'</div>';
      dayItems.slice(0,3).forEach(function(e){
        var tc=typeColor(e.type||'Other');
        h+='<div onclick="showEventDetail(\''+esc(e.id)+'\')" style="cursor:pointer;font-family:var(--fM);font-size:7.5px;border-left:2px solid '+tc+';padding:1px 4px;margin-bottom:2px;background:rgba(0,0,0,.03);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="'+esc(e.title||e.type)+'">'+esc((e.title||e.type||'').substring(0,16))+'</div>';
      });
      if(dayItems.length>3) h+='<div onclick="_mcView=\'daily\';_mcOffset='+Math.round((d-today)/86400000)+';rerender(\'mycalendar\',true)" style="cursor:pointer;font-family:var(--fM);font-size:7px;color:var(--gold);text-decoration:underline">+'+(dayItems.length-3)+' more</div>';
      h+='</div>';
    }
  }
  h+='</div>';

}
function navTo(p){
  document.querySelectorAll('.sn-b,.mn-b').forEach(function(b){b.classList.toggle('on',b.dataset.p===p);});
  document.querySelectorAll('.mob-more-item').forEach(function(b){b.classList.toggle('on',b.dataset.p===p);});
  // Show a dot on "More" tab if the active page is in secondary nav
  const moreBtn=document.getElementById('mn-more-btn');
  const moreDot=document.getElementById('mn-more-dot');
  const flat=Array.from(document.querySelectorAll('.mob-more-item')).map(function(b){return b.dataset.p;});
  if(moreBtn)moreBtn.classList.toggle('on',flat.indexOf(p)>-1);
  if(moreDot)moreDot.classList.toggle('show',flat.indexOf(p)>-1);
  document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('on');});
  if(!_panels[p]){const el=document.createElement('div');el.className='panel';document.getElementById('pm').appendChild(el);_panels[p]=el;}
  _panels[p].classList.add('on');
  _currentPage=p;
  _dirtyPanels.delete(p); // fresh view of this page — any prior unsaved state here is moot now
  build(p,_panels[p]);
  document.getElementById('pm').scrollTop=0;
  closeSB();
  if(typeof updateAssistantContextNote==='function') updateAssistantContextNote();
}
function rerender(p, force){
  if(!(_panels[p]&&_panels[p].classList.contains('on')))return;
  // Central guard: never blow away text someone is actively typing in THIS
  // panel — this check always applies, force or not.
  if(_dirtyPanels.has(p))return;
  // The modal check only guards against a BACKGROUND sync shifting the page
  // under someone's feet. A deliberate click (filter, tab, etc.) can pass
  // force=true to bypass it safely — the modal is a sibling overlay, not
  // part of the panel being rebuilt, so it's unaffected either way.
  if(!force && _dirtyPanels.has('__modal__'))return;
  _dirtyPanels.delete(p);
  build(p,_panels[p]);
}

function onEventCompanyChange(coId){

    if(ctSel)ctSel.innerHTML=opts;

function saveEvent(id){
  const title=document.getElementById('_f-title').value.trim();
  if(!title){toast('Enter a title');return;}
  const cal=loadCal();
  const existing=id?cal.find(function(e){return e.id===id;}):null;
  const studio=document.getElementById('_f-studio').value;
  const city=document.getElementById('_f-city').value;
  const address=document.getElementById('_f-addr').value;
  const loc=[studio,city].filter(Boolean).join(', ')||address;
  let companyId='';
  const coSel=document.getElementById('_f-company');
  const coVal=coSel?coSel.value:'';
  if(coVal==='__new__'){
    const newName=document.getElementById('_f-newco').value.trim();
    if(newName){
      const coList=loadCompanies();
      let match=coList.find(function(c){return c.name.toLowerCase()===newName.toLowerCase();});
      if(!match){
        match={id:slugify(newName)+Date.now().toString(36),name:newName,type:'Other',market:city||'\u2014'};
        coList.push(match);
        saveCompanies(coList);
      }
      companyId=match.id;
    }
  }else if(coVal){
    companyId=coVal;
  }
  const contactId=document.getElementById('_f-contact')?document.getElementById('_f-contact').value:'';
  const base={
    type:document.getElementById('_f-type').value,
    status:document.getElementById('_f-status').value,
    title:title,
    client:document.getElementById('_f-client').value,
    companyId:companyId,
    contactId:contactId,
    date:document.getElementById('_f-date').value,
    time:document.getElementById('_f-time').value,
    studio:studio,
    city:city,
    country:fv('_f-country'),
    address:address,
    loc:loc,
    usageType:fv('_f-usagetype'),
    rateType:fv('_f-ratetype'),
    paymentTerms:fv('_f-payterms'),
    transportNotes:fv('_f-transportnotes'),
    photographer:fv('_f-photo'),
    creativeDirector:fv('_f-cd'),
    artDirector:fv('_f-artdirector'),
    castingDirector:fv('_f-castingdirector'),
    stylist:fv('_f-sty'),
    producer:fv('_f-producer'),
    hairStylist:fv('_f-hair'),
    makeupArtist:fv('_f-mua'),
    setDesigner:fv('_f-setdesign'),
    rate:document.getElementById('_f-rate').value,
    notes:document.getElementById('_f-notes').value,
    castingFormat:fv('_fc-format'),
    callbackLikely:fv('_fc-callback'),
    lookRequirements:fv('_fc-look'),
    arrivalWindow:fv('_fc-arrival'),
    decisionBy:fv('_fc-decision'),
    castingBrief:fv('_fc-brief'),
    shootType:fv('_fs-shoottype'),
    shootDay:fv('_fs-day'),
    callTime:fv('_fs-call'),
    wrapTime:fv('_fs-wrap'),
    looksCount:fv('_fs-looks'),
    usageTerms:fv('_fs-usage'),
    transportation:fv('_fs-transport'),
    mealsProvided:fv('_fs-meals'),
    shotList:fv('_fs-shotlist')
  };
  const groupChk=document.getElementById('_f-group');
  const isGroup=(!id&&groupChk&&groupChk.checked);
  if(isGroup){
    const target=document.getElementById('_f-grouptarget').value;
    let keys=[];
    if(target==='all')keys=Object.keys(MODELS);
    else if(target==='nf-women')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='New Face'&&MODELS[k].gender==='Women';});
    else if(target==='nf-men')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='New Face'&&MODELS[k].gender==='Men';});
    else if(target==='est-women')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='Established'&&MODELS[k].gender==='Women';});
    else if(target==='est-men')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='Established'&&MODELS[k].gender==='Men';});
    else if(target==='custom')keys=Array.prototype.slice.call(document.querySelectorAll('._f-custom-model:checked')).map(function(cb){return cb.value;});
    if(!keys.length){toast('Select at least one model for the group');return;}
    const groupId='grp'+Date.now();
    keys.forEach(function(k,idx){
      cal.push(Object.assign({},base,{id:'ev'+Date.now()+'_'+idx,model:k,groupId:groupId,confirmed:false}));
    });
    saveCal(cal);
    closeModal();
    toast('\u2713 Booking added for '+keys.length+' model'+(keys.length>1?'s':''));
    rerender('calendar');rerender('overview');
    return;
  }
  const obj=Object.assign({},base,{
    id:id||('ev'+Date.now()),
    model:document.getElementById('_f-model').value,
    confirmed:existing?existing.confirmed||false:false,
    groupId:existing?existing.groupId||'':''
  });
  if(id){const i=cal.findIndex(function(e){return e.id===id;});cal[i]=obj;}else cal.push(obj);
  saveCal(cal);
  closeModal();
  toast('\u2713 Booking saved');
  rerender('calendar');rerender('overview');
}

function deleteEvent(id){
  if(!confirm('Delete this booking?'))return;
  markForDeletion(CAL_KEY,id);
  saveCal(loadCal().filter(function(e){return e.id!==id;}));
  closeModal();
  toast('Booking deleted');
  rerender('calendar');rerender('overview');
}

var calOffset=0;
var calViewMode='agenda';
function setCalView(mode,panelKey){calViewMode=mode;rerender(panelKey);}
function renderCalendar(el){
  const isModel=(typeof isAgent!=='undefined')&&!isAgent;
  const cal=loadCal();
  const filtered=isModel?cal.filter(function(e){return e.model===whoKey;}):cal;
  const today=new Date();today.setHours(0,0,0,0);
  const start=addD(today,calOffset);
  const panelKey=isModel?'mycal':'calendar';

  let h='<div class="ph">'
    +'<div class="ph-eye">'+(isModel?'My Schedule':'Agency Calendar')+'</div>'
    +'<h1 class="ph-h1">'+(isModel?'My <em>Bookings</em>':'The <em>Calendar</em>')+'</h1>'
    +'<div class="ph-sub">'+(isModel?'Your confirmed and pending appointments. Tap any booking to view full details, change status, or confirm your attendance.':'Two-week agenda or weekly grid across the full roster. Tap any booking to view, edit, or change its status.')+'</div>'
  +'</div><div class="cnt">';

  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">'
    +'<button class="btn" onclick="calOffset-=7;rerender(\''+panelKey+'\',true)">\u2190 Prev Week</button>'
    +'<button class="btn" onclick="calOffset=0;rerender(\''+panelKey+'\',true)\">Today</button>'
    +'<button class="btn" onclick="calOffset+=7;rerender(\''+panelKey+'\',true)">Next Week \u2192</button>'
    +'<div class="view-toggle" style="margin-left:8px">'
      +'<button class="'+(calViewMode==='agenda'?'on':'')+'" onclick="setCalView(\'agenda\',\''+panelKey+'\')">Agenda</button>'
      +'<button class="'+(calViewMode==='week'?'on':'')+'" onclick="setCalView(\'week\',\''+panelKey+'\')">Week</button>'
    +'</div>'
    +((typeof isAgent!=='undefined'&&isAgent)?'<button class="btn pri" style="margin-left:auto" onclick="openEvent(null)">+ New Booking</button>':'')
  +'</div>';

  if(calViewMode==='week'){
    const dow=start.getDay();
    const mondayDiff=(dow===0?-6:1-dow);
    const weekStart=addD(start,mondayDiff);
    const weekDays=[];for(let i=0;i<7;i++)weekDays.push(addD(weekStart,i));
    h+='<div class="week-grid">';
    weekDays.forEach(function(d){
      const dKey=dk(d);
      const evs=filtered.filter(function(e){return e.date===dKey;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
      const isToday=dKey===dk(today);
      h+='<div class="week-day">'
        +'<div class="week-day-hd'+(isToday?' today':'')+'">'+DOW[d.getDay()]+'<br>'+MON[d.getMonth()]+' '+d.getDate()+'</div>'
        +'<div class="week-day-body">'
        +(evs.length?evs.map(function(e){
          const t=evCol(e.type);
          return '<div class="week-evt" style="border-left-color:'+t.c+'" onclick="openEvent(\''+e.id+'\')">'
            +'<div class="week-evt-time">'+esc(e.time||'TBD')+'</div>'
            +'<div class="week-evt-title">'+esc(e.title)+'</div>'
          +'</div>';
        }).join(''):'<div style="font-size:11px;color:var(--faint)">No bookings</div>')
        +'</div>'
      +'</div>';
    });
    h+='</div>';
  }else{
    const days=[];for(let i=0;i<14;i++)days.push(addD(start,i));
    days.forEach(function(d){
      const dKey=dk(d);
      const evs=filtered.filter(function(e){return e.date===dKey;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
      const isToday=dKey===dk(today);
      h+='<div class="sl" style="margin-top:18px"><div class="sl-t" style="color:'+(isToday?'var(--gold)':'var(--ink)')+'">'+DOW[d.getDay()]+' · '+MON[d.getMonth()]+' '+d.getDate()+(isToday?' — TODAY':'')+'</div><div class="sl-line"></div></div>';
      h+=evs.length?('<div class="tickets">'+evs.map(function(e){return ticketCardHTML(e);}).join('')+'</div>'):'<div class="empty">No bookings</div>';
    });
  }

  h+='</div>';
  el.innerHTML=h;
}

/* ===== Critical Ticker ===== */
function buildTicker(){
  const el=document.getElementById('tickerTrack');
  if(!el)return;
  const alerts=buildAlerts().sort(function(a,b){return daysUntil(a.date)-daysUntil(b.date);}).filter(function(a){return daysUntil(a.date)>=0;});
  if(!alerts.length){el.innerHTML='';return;}
  const items=alerts.map(function(a){
    const n=daysUntil(a.date);
    const cls=a.type==='critical'?'burg':(a.type==='gold'?'gold':'');
    const mark=a.type==='critical'?'\u26A0 ':'';
    return '<span class="tk-item '+cls+'">'+mark+'<span class="tk-dot"></span>'+esc(a.title.toUpperCase())+' \u2014 '+esc(a.body.toUpperCase())+' ('+countdownLabel(n)+')</span>';
  });
  const dbl=items.concat(items);
  el.innerHTML=dbl.join('');
}

    const cos=companiesForContact(ct.id);
    return cos.some(function(c){return c.name.toLowerCase().indexOf(q)>-1;});
  });
  document.getElementById('_ct-count').textContent='Contacts — '+filtered.length;
  document.getElementById('_ct-rows').innerHTML=filtered.length?filtered.map(contactCardHTML).join(''):'<div class="empty">No contacts match your search</div>';
}

  const list=loadCompanies();
  const dupe=list.some(function(c){return c.id!==_editingCompanyId&&c.name.toLowerCase()===name.toLowerCase();});
  if(dupe){toast('Company already exists');return;}

  const data={

function sendContact(){
  const first=document.getElementById('_ct-first').value.trim();
  const last=document.getElementById('_ct-last').value.trim();
  const email=document.getElementById('_ct-email').value.trim();
  if(!first){toast('Enter a first name');return;}
  if(!email){toast('Enter a primary email');return;}
  const name=(first+' '+last).trim();
  const list=loadContacts();
  const dupe=list.some(function(c){return c.id!==_editingContactId&&c.name.toLowerCase()===name.toLowerCase()&&(c.email||'').toLowerCase()===email.toLowerCase();});
  if(dupe){toast('Contact already exists');return;}

  let companies=[];
  const coSel=document.getElementById('_ct-company').value;
  if(coSel==='__new__'){
    const newName=document.getElementById('_ct-newco').value.trim();
    if(newName){
      const coList=loadCompanies();
      let existing=coList.find(function(c){return c.name.toLowerCase()===newName.toLowerCase();});
      if(!existing){
        existing={id:slugify(newName)+Date.now().toString(36),name:newName,type:'Other',market:'\u2014'};
        coList.push(existing);
        saveCompanies(coList);
      }
      companies=[existing.id];
    }
  }else if(coSel){
    companies=[coSel];
  }

  const title=document.getElementById('_ct-title').value.trim();
  const role=document.getElementById('_ct-role').value;
  const marketFocus=(document.querySelector('input[name="_ct-mf"]:checked')||{}).value||'';
  const preferredContact=(document.querySelector('input[name="_ct-pref"]:checked')||{}).value||'';

  const data={
    name:name,
    role:title||role,
    category:role,
    pronouns:document.getElementById('_ct-pronouns').value.trim(),
    agency:document.getElementById('_ct-agency').value.trim(),
    marketFocus:marketFocus,
    email:email,
    email2:document.getElementById('_ct-email2').value.trim(),
    phone:document.getElementById('_ct-phone').value.trim(),
    whatsapp:document.getElementById('_ct-whatsapp').value.trim(),
    instagram:document.getElementById('_ct-instagram').value.trim(),
    preferredContact:preferredContact,
    basedIn:document.getElementById('_ct-basedin').value.trim(),
    timezone:document.getElementById('_ct-timezone').value.trim(),
    owner:document.getElementById('_ct-owner').value,
    tags:document.getElementById('_ct-tags').value.trim(),
    assistantName:document.getElementById('_ct-asstname').value.trim(),
    assistantEmail:document.getElementById('_ct-asstemail').value.trim(),
    notes:document.getElementById('_ct-notes').value.trim(),
    companies:companies
  };

  if(_editingContactId){
    const i=list.findIndex(function(c){return c.id===_editingContactId;});
    if(i>-1){list[i]=Object.assign({},list[i],data);}
    saveContacts(list);
    toast('\u2713 Contact updated');
  }else{
    list.push(Object.assign({id:slugify(name)+Date.now().toString(36)},data));
    saveContacts(list);
    submitToGoogleForm({
      name:name,
      role:title||role,
      company:companies.length?(loadCompanies().find(function(c){return c.id===companies[0];})||{}).name||'':'',
      agency:document.getElementById('_ct-agency').value.trim(),
      marketFocus:marketFocus,
      email:email,
      email2:document.getElementById('_ct-email2').value.trim(),
      phone:document.getElementById('_ct-phone').value.trim()
    });
    toast('\u2713 Contact added'+(GOOGLE_FORM_CONFIG.enabled?' \u0026 synced to Google Form':''));
  }
  resetContactForm();
  rerender('allcontacts');
}

/* ===== Model Travel — Expand Mode ===== */
var _travelCountdownTimer=null;
function _travelStatusColor(s){ return s==='approved'?'var(--sage)':s==='declined'?'var(--burg)':'var(--gold)'; }
function _travelStatusLabel(s){ return s==='approved'?'Confirmed':s==='declined'?'Declined':'Awaiting Your Response'; }
function _fmtTravelDate(d){
  if(!d)return '';
  var dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
// Find the single most relevant countdown target: the soonest upcoming
// departure, or — if the model is currently mid-trip — the return departure.
function _travelCountdownTarget(recs){
  var now=new Date(), best=null;
  recs.forEach(function(r){
    if(r.status==='declined')return;
    var ob=r.outbound||{};
    if(ob.date){
      var obDT=new Date(ob.date+'T'+(ob.departTime||'00:00')+':00');
      if(obDT>now && (!best||obDT<best.targetDate)) best={label:'Departs In',targetDate:obDT,rec:r};
    }
  });
  if(!best){
    recs.forEach(function(r){
      if(r.status==='declined')return;
      var ob=r.outbound||{}, rt=r.return||{};
      if(ob.date && rt.date){
        var obArrDT=new Date(ob.date+'T'+(ob.arriveTime||ob.departTime||'00:00')+':00');
        var rtDT=new Date(rt.date+'T'+(rt.departTime||'00:00')+':00');
        if(now>=obArrDT && now<rtDT && (!best||rtDT<best.targetDate)) best={label:'Return Departs In',targetDate:rtDT,rec:r};
      }
    });
  }
  return best;
}
function _travelCountdownTick(){
  var el=document.getElementById('_travel-cd-val');
  if(!el)return;
  var target=window._travelCdTarget;
  if(!target){return;}
  var diff=target.getTime()-Date.now();
  if(diff<=0){ el.textContent="Wheels up"; clearInterval(_travelCountdownTimer); return; }
  var d=Math.floor(diff/86400000);
  var h=Math.floor((diff%86400000)/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);
  el.textContent=(d>0?d+'d ':'')+(h<10?'0':'')+h+'h '+(m<10?'0':'')+m+'m '+(s<10?'0':'')+s+'s';
}

        +(r.notes?'<div style="font-family:var(--fM);font-size:11px;color:var(--ink2);padding:10px 0;border-top:1px solid var(--line);line-height:1.6">'+esc(r.notes)+'</div>':'')

function modelPhotoLightboxStep(dir){

async function showGuestPackage(pkgId,modelKey){
  // Show loading screen
  var wrap=document.createElement('div');
  wrap.id='_guest-pkg-wrap';
  wrap.style.cssText='position:fixed;inset:0;background:#111009;z-index:9999;display:flex;align-items:center;justify-content:center';
  wrap.innerHTML='<div style="text-align:center"><div style="font-family:Georgia,serif;font-style:italic;font-size:24px;color:#C9A46A;margin-bottom:8px">Maison de Veux</div><div style="font-family:\'Courier New\',monospace;font-size:9px;letter-spacing:.2em;color:rgba(245,240,232,.4)">Loading package\u2026</div></div>';
  document.body.appendChild(wrap);

  try{
    // Load package from Supabase
    const SB=SUPABASE_CONFIG.url;
    const KEY=SUPABASE_CONFIG.anonKey;
    const resp=await fetch(SB+'/rest/v1/mdv_sync?key=eq.mdvc_multipackages_2026&select=data',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    const rows=await resp.json();
    const pkgs=(rows&&rows[0]&&rows[0].data)||[];
    const pkg=pkgs.find(function(p){return p.id===pkgId;});
    // Remove loading overlay
    var lo=document.getElementById('_pkg-loading');if(lo)lo.remove();
    if(!pkg){
      wrap.innerHTML='<div style="text-align:center;color:#F5F0E8;font-family:Georgia,serif"><div style="font-size:20px;margin-bottom:10px">Package not found</div><div style="font-size:12px;opacity:.5">This package may have expired or been removed.</div></div>';
      return;
    }
    // Fetch measurements from Supabase and seed into local cache
    // so measInfo(key) returns correct data for all models
    try{
      const measResp=await fetch(SB+'/rest/v1/mdv_sync?key=eq.mdvc_measurements_2026&select=data',{
        headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
      });
      const measRows=await measResp.json();
      const measData=(measRows&&measRows[0]&&measRows[0].data)||{};
      if(Object.keys(measData).length){
        // Seed into localStorage so measInfo() works
        try{localStorage.setItem('mdvc_measurements_2026',JSON.stringify(measData));}catch(e){}
        if(typeof _measCache!=='undefined')window._measCache=measData;
      }
    }catch(e){/* measurements fetch failed, use embeddedMeas */}

    // Render the interactive package viewer
    wrap.remove();
    renderGuestPackageViewer(pkg,modelKey);
  }catch(err){
    var lo2=document.getElementById('_pkg-loading');if(lo2)lo2.remove();
    wrap.innerHTML='<div style="text-align:center;color:#F5F0E8;padding:40px"><div style="font-size:18px;margin-bottom:10px">Could not load package</div><div style="font-size:11px;opacity:.5">'+err.message+'</div></div>';
  }
}

function renderGuestPackageViewer(pkg,openModelKey){
  // Build the package viewer directly in the DOM - no iframe needed

async function notifyAgentResponse(pkg,model,type,message){
  try{
    const SB=SUPABASE_CONFIG.url;const KEY=SUPABASE_CONFIG.anonKey;
    const resp=await fetch(SB+'/rest/v1/mdv_sync?key=eq.mdvc_multipackages_2026&select=data',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    const rows=await resp.json();
    const pkgs=(rows&&rows[0]&&rows[0].data)||[];
    const pIdx=pkgs.findIndex(function(p){return p.id===pkg.id;});
    if(pIdx<0)return;
    if(!pkgs[pIdx].responses)pkgs[pIdx].responses=[];
    pkgs[pIdx].responses=pkgs[pIdx].responses.filter(function(r){
      return !(r.model===(model.name||model.key)&&r.type===type);
    });
    if(type!==null){
      pkgs[pIdx].responses.push({
        type:type,model:model.name||model.key||'',message:message||'',
        ts:new Date().toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})
      });
    }
    await fetch(SB+'/rest/v1/mdv_sync?key=eq.mdvc_multipackages_2026',{
      method:'PATCH',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({data:pkgs})
    });
  }catch(e){console.warn('Could not save response:',e);}
}

function filterNames(){
  var q=(document.getElementById('nameInp')||{value:''}).value.toLowerCase().trim();
  var res=document.getElementById('nameResults');
  if(!res)return;
  if(!q){res.classList.remove('show');return;}
  // Deduplicate by lowercase name before filtering
  var seen={};
  var unique=[];
  Object.entries(MODELS).forEach(function(e){
    if(e[1].active===false) return;
    var name=(e[1].name||'').toLowerCase();
    if(!seen[name]){seen[name]=true;unique.push(e);}
  });
  var matches=unique.filter(function(e){
    return e[1].name.toLowerCase().indexOf(q)>-1;
  }).slice(0,10);
  if(!matches.length){res.classList.remove('show');return;}
  res.innerHTML=matches.map(function(e){
    var m=e[1];
    var safeKey=e[0].replace(/'/g,"\\'");
    var safeName=(m.name||'').replace(/'/g,"\\'");
    return '<div onclick="pickName(\''+safeKey+'\',\''+safeName+'\')">'
      +'<span style="flex:1;font-family:var(--fD);font-size:19px;color:#1C1916">'+esc(m.name||'')+'</span>'
      +'<span style="font-family:var(--fM);font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:#C9A35A;margin-left:12px;flex-shrink:0">'+esc(m.stage||'')+'</span>'
    +'</div>';
  }).join('');
  res.classList.add('show');
}

  if(inp){inp.value=name;inp.dataset.key=key;}

// A model only ever sees her own data here — context is scoped to her
// own upcoming bookings/tasks and the page she's on, never other models.
function gatherAssistantContext(){
  var lines = [];
  var page = _currentPage || 'unknown';
  lines.push('Current page: ' + page);

  if(whoKey && MODELS[whoKey]){
    var m = MODELS[whoKey];
    lines.push('Logged in as: ' + m.name + ' (' + (m.stage||'') + ', ' + (m.market||'') + ')');
    try {
      var cal = loadCal();
      var todayStr = new Date().toISOString().slice(0,10);
      var mine = cal.filter(function(e){ return (e.model===whoKey || (e.models||[]).indexOf(whoKey)>-1) && e.date>=todayStr; })
                    .sort(function(a,b){ return a.date>b.date?1:-1; });
      if(mine.length){
        lines.push('');
        lines.push('Upcoming bookings (' + mine.length + '):');
        mine.slice(0,10).forEach(function(e){
          lines.push('- ' + (e.title||'Untitled') + ' — ' + e.date + (e.time?' '+e.time:'') + (e.confirmed===false?' (awaiting her confirmation)':'') + (e.type?' ['+e.type+']':''));
        });
      }
    } catch(e){}
  }

  return lines.join('\n');
}

function updateAssistantContextNote(){
  var note = document.getElementById('_asst-context-note');
  if(!note) return;
  note.textContent = whoKey && MODELS[whoKey] ? ('\u2713 Can see: your upcoming bookings and tasks') : '';
}

function sendAssistantMessage(){
  if(_asstBusy) return;
  var inp = document.getElementById('_asst-input');
  var text = inp ? inp.value.trim() : '';
  if(!text) return;
  inp.value = '';
  _asstAppendMsg('user', text);
  _asstHistory.push({role:'user', content:text});

  _asstBusy = true;
  var sendBtn = document.getElementById('_asst-send-btn');
  if(sendBtn) sendBtn.disabled = true;
  var typingMsgs = document.getElementById('_asst-msgs');
  var typing = document.createElement('div');
  typing.id = '_asst-typing';
  typing.style.cssText = 'align-self:flex-start;font-family:var(--fM);font-size:11px;color:var(--mute);font-style:italic';
  typing.textContent = 'Thinking...';
  if(typingMsgs){ typingMsgs.appendChild(typing); typingMsgs.scrollTop = typingMsgs.scrollHeight; }

  fetch('/.netlify/functions/ask-claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: text,
      context: gatherAssistantContext(),
      portal: 'model',
      history: _asstHistory.slice(0,-1)
    })
  })
  .then(function(r){
    if(r.status===404){
      var err404 = new Error('NOT_DEPLOYED');
      err404.httpStatus = 404;
      throw err404;
    }
    return r.text().then(function(raw){
      var parsed;
      try{ parsed = JSON.parse(raw); }
      catch(e){
        var errParse = new Error('NON_JSON_RESPONSE');
        errParse.httpStatus = r.status;
        errParse.raw = raw.slice(0,200);
        throw errParse;
      }
      return {ok:r.ok, data:parsed};
    });
  })
  .then(function(res){
    var t = document.getElementById('_asst-typing'); if(t) t.remove();
    if(!res.ok || res.data.error){
      _asstAppendMsg('assistant', '\u26A0 ' + (res.data.error || 'Something went wrong reaching the assistant.'));
      return;
    }
    _asstAppendMsg('assistant', res.data.reply || '(no response)');
    _asstHistory.push({role:'assistant', content:res.data.reply||''});
    if(_asstHistory.length>20) _asstHistory = _asstHistory.slice(-20);
  })
  .catch(function(e){
    var t = document.getElementById('_asst-typing'); if(t) t.remove();
    if(e && e.message==='NOT_DEPLOYED'){
      _asstAppendMsg('assistant', '\u26A0 The assistant function isn\u2019t deployed on this site yet. The netlify/functions/ask-claude.js file needs to be included in the deploy, alongside the portal\u2019s HTML file.');
    } else if(e && e.message==='NON_JSON_RESPONSE'){
      _asstAppendMsg('assistant', '\u26A0 The server responded with something unexpected (status '+e.httpStatus+'), not a valid reply. This usually means the function deployed but hit an error \u2014 check that ANTHROPIC_API_KEY is set correctly in Netlify\u2019s environment variables for this site.');
    } else {
      _asstAppendMsg('assistant', '\u26A0 Could not reach the server at all \u2014 check your internet connection and try again.');
    }
  })
  .finally(function(){
    _asstBusy = false;
    if(sendBtn) sendBtn.disabled = false;
  });
}

function launch(){
  hydrateHeavyStores(function(){
    sbPullAll(function(){
      try{
        seedMeasurements();seedContacts();seedCompanies();
        document.getElementById('login').style.display='none';
        document.getElementById('app').classList.add('on');
        document.body.style.overflow='hidden'; // the app itself handles its own scrolling internally — the outer page should never also scroll, which is what was pushing fixed buttons out of view
        // Use model's info for the topbar
        var person=MODELS[whoKey]||{};
        var av=document.getElementById('tbAv');
        if(av)av.textContent=person.name?(person.name.charAt(0)):'M';
        var nm=document.getElementById('tbName');
        if(nm)nm.textContent=person.name||'Model';
        buildNav(NAV_MODEL);
        initScrollTop();
        navTo('overview');
        startSyncPolling();
        initSupabaseRealtime();
        initAssistantWidget();
        if(typeof pullAllPhotos==='function'){ try{ pullAllPhotos(function(){}); }catch(e){} }
        markAgentMsgsDelivered();
      }catch(ex){showFatalError(ex.message);}
    });
  });
}
</script>

    if(otherDocs.length){
      h+='<div class="ma-section-hd" style="margin-top:24px">Other Documents</div>';
      h+=otherDocs.map(docRowHTML).join('');
    }

    if(!docs.length){
      h+='<div class="ma-empty">Upload documents above to share them with the Maison de Veux team</div>';
    }
  }
  h+='</div>';
  el.innerHTML=h;
}
function handleMADocUpload(inputEl,modelKey){
  const cat=document.getElementById('_madoc-cat').value;
  const files=Array.prototype.slice.call(inputEl.files||[]);
  if(!files.length) return;
  toast('Uploading\u2026');
  let done=0, failed=0;
  function next(i){
    if(i>=files.length){
      inputEl.value='';rerender('maprofile');
      toast('\u2713 '+done+' file'+(done===1?'':'s')+' sent to agency'+(failed?' \u2014 '+failed+' failed':''));
      return;
    }
    uploadMADocument(files[i], modelKey, cat, function(err){
      if(err){ console.warn('Document upload failed:', err.message); failed++; }
      else { done++; }
      next(i+1);
    });
  }
  next(0);
}

function renderMASchedule(el){
  const keys=myModelKeys();
  const today=new Date();today.setHours(0,0,0,0);
  const start=addD(today,maCalOffset);
  const all=loadCal().filter(function(e){return keys.indexOf(e.model)>-1;});

  let h='<div class="ph">'
    +'<div class="ph-eye">Maison de Veux \u2014 Your Models</div>'
    +'<h1 class="ph-h1">The <em>Calendar</em></h1>'
    +'<div class="ph-sub">Live schedule across all your models. Tap any booking for full details. Read-only access.</div>'
  +'</div><div class="cnt">';

  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">'
    +'<button class="btn" onclick="maCalOffset-=7;rerender(\'schedule\',true)">\u2190 Prev Week</button>'
    +'<button class="btn" onclick="maCalOffset=0;rerender(\'schedule\',true)\">Today</button>'
    +'<button class="btn" onclick="maCalOffset+=7;rerender(\'schedule\',true)">Next Week \u2192</button>'
    +'<div class="view-toggle" style="margin-left:8px">'
      +'<button class="'+(maCalViewMode==='agenda'?'on':'')+'" onclick="setMACalView(\'agenda\')">Agenda</button>'
      +'<button class="'+(maCalViewMode==='week'?'on':'')+'" onclick="setMACalView(\'week\')">Week</button>'
    +'</div>'
    // Model filter pills
    +'<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">'
    +keys.map(function(k){
      const m=MODELS[k];
      return '<span style="font-family:var(--fM);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;background:var(--ivory);border:1px solid var(--line);color:var(--mute)">'+esc(m.name.split(' ')[0])+'</span>';
    }).join('')
    +'</div>'
  +'</div>';

  if(maCalViewMode==='week'){
    const dow=start.getDay();
    const mondayDiff=(dow===0?-6:1-dow);
    const weekStart=addD(start,mondayDiff);
    const weekDays=[];for(let i=0;i<7;i++)weekDays.push(addD(weekStart,i));
    h+='<div class="week-grid">';
    weekDays.forEach(function(d){
      const dKey=dk(d);
      const evs=all.filter(function(e){return e.date===dKey;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
      const isToday=dKey===dk(today);
      h+='<div class="week-day">'
        +'<div class="week-day-hd'+(isToday?' today':'')+'">'+DOW[d.getDay()]+'<br>'+MON[d.getMonth()]+' '+d.getDate()+'</div>'
        +'<div class="week-day-body">'
        +(evs.length?evs.map(function(e){
          const t=evCol(e.type);
          const m=MODELS[e.model];
          return '<div class="week-evt" style="border-left-color:'+t.c+'" onclick="openMAEvent(\''+e.id+'\')">'+
            '<div class="week-evt-time">'+esc(e.time||'TBD')+'</div>'+
            '<div class="week-evt-title">'+esc(e.title)+'</div>'+
            (m?('<div style="font-family:var(--fM);font-size:9px;color:var(--mute);margin-top:2px">'+esc(m.name.split(' ')[0])+'</div>'):'')
          +'</div>';
        }).join(''):'<div style="font-size:11px;color:var(--faint)">No bookings</div>')
        +'</div></div>';
    });
    h+='</div>';
  }else{
    const days=[];for(let i=0;i<14;i++)days.push(addD(start,i));
    days.forEach(function(d){
      const dKey=dk(d);
      const evs=all.filter(function(e){return e.date===dKey;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
      const isToday=dKey===dk(today);
      h+='<div class="sl" style="margin-top:18px"><div class="sl-t" style="color:'+(isToday?'var(--gold)':'var(--ink)')+'">'+DOW[d.getDay()]+' \u00b7 '+MON[d.getMonth()]+' '+d.getDate()+(isToday?' \u2014 TODAY':'')+'</div><div class="sl-line"></div></div>';
      if(!evs.length){h+='<div class="empty">No bookings</div>';return;}
      h+='<div class="tickets">'+evs.map(function(ev){
        const t=evCol(ev.type);
        const m=MODELS[ev.model];
        const evDate=new Date(ev.date+'T12:00:00');
        return '<div class="ticket" style="border-left-color:'+t.c+';cursor:pointer" onclick="openMAEvent(\''+ev.id+'\')">'
          +'<div class="tk-eye" style="color:'+t.c+'">'+esc(ev.type)+(m?' \u2014 '+esc(m.name):'')+'</div>'
          +'<div class="tk-title">'+esc(ev.title)+'</div>'
          +'<div class="tk-meta">'
            +'<span>\uD83D\uDCC5 '+evDate.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})+(ev.time?' \u00b7 '+esc(ev.time):'')+'</span>'
            +(ev.loc?('<span>\uD83D\uDCCD '+esc(ev.loc)+'</span>'):'')
            +(ev.client?('<span>\uD83C\uDFE2 '+esc(ev.client)+'</span>'):'')
            +(ev.confirmed?'<span style="color:var(--sage)">\u2713 Confirmed</span>':'<span style="color:var(--gold)">\u23F3 Pending</span>')
          +'</div>'
        +'</div>';
      }).join('')+'</div>';
    });
  }

  if(!all.length)h+='<div class="ma-empty">No bookings on file for your models</div>';
  h+='</div>';
  el.innerHTML=h;
}

                +(c.jobDate?('<div><div style="font-family:var(--fM);font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Date</div><div style="font-family:var(--fD);font-size:14px">'+esc(c.jobDate)+'</div></div>'):'')
                +(c.paymentMethod?('<div><div style="font-family:var(--fM);font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Method</div><div style="font-family:var(--fD);font-size:14px">'+esc(c.paymentMethod)+'</div></div>'):'')
                +(c.invoiceRef?('<div><div style="font-family:var(--fM);font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Invoice Ref</div><div style="font-family:var(--fD);font-size:14px">'+esc(c.invoiceRef)+'</div></div>'):'')
              +'</div>'
            +'</div>'
            +'<div style="text-align:right;flex-shrink:0">'
              +'<div style="font-family:var(--fD);font-size:28px;color:'+col+'">$'+(c.commissionAmount||0).toLocaleString()+'</div>'
              +'<div style="font-family:var(--fM);font-size:9px;color:var(--faint);margin-top:2px">of $'+(c.jobFee||0).toLocaleString()+' job fee</div>'
              +'<div style="font-family:var(--fM);font-size:9px;color:var(--faint);margin-top:2px">Tap for details \u2192</div>'
            +'</div>'
          +'</div>'
        +'</div>';
      });
    });
  }
  h+='</div>';
  el.innerHTML=h;
}

/* ===== Requests / Approvals ===== */
function maRequestCardHTML(r,compact){
  const m=MODELS[r.modelKey];
  const noteId='_req-note-'+r.id;
  const d=r.date?new Date(r.date+'T12:00:00'):null;
  const dateStr=d?d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'';
  let h='<div class="ma-req-card '+r.status+'" style="position:relative">'
    +'<div class="ma-req-status '+r.status+'">'+({pending:'Awaiting Response',approved:'Approved \u2713',declined:'Declined'}[r.status]||r.status)+'</div>'
    +'<div class="ma-req-head">'
      +'<div class="ma-req-type">'+esc(r.type)+(m?' \u2014 '+esc(m.name):'')+'</div>'
      +'<div class="ma-req-title">'+esc(r.title)+'</div>'
      +'<div class="ma-req-meta">From: '+esc(TEAM[r.requestedBy]?TEAM[r.requestedBy].name:r.requestedBy||'')+' \u00b7 Submitted '+esc(r.ts||'')+'</div>'
    +'</div>';

  // Structured detail block
  const hasDetails=r.date||r.time||r.location||r.duration||r.client||r.description;
  if(hasDetails){
    h+='<div class="ma-req-details-block">';
    if(r.date)h+='<div class="ma-req-detail-row"><div class="ma-req-detail-lbl">Date</div><div class="ma-req-detail-val">'+esc(dateStr)+'</div></div>';
    if(r.time||r.endTime){
      const timeStr=(r.time||'')+(r.endTime?' \u2014 '+esc(r.endTime):'');
      h+='<div class="ma-req-detail-row"><div class="ma-req-detail-lbl">Time</div><div class="ma-req-detail-val">'+esc(timeStr)+'</div></div>';
    }
    if(r.duration)h+='<div class="ma-req-detail-row"><div class="ma-req-detail-lbl">Duration</div><div class="ma-req-detail-val">'+esc(r.duration)+'</div></div>';
    if(r.location)h+='<div class="ma-req-detail-row"><div class="ma-req-detail-lbl">Location</div><div class="ma-req-detail-val">'+esc(r.location)+(r.locationDetail?'<br><span style="font-size:13px;font-family:var(--fB);color:var(--mute)">'+esc(r.locationDetail)+'</span>':'')+'</div></div>';
    if(r.client)h+='<div class="ma-req-detail-row"><div class="ma-req-detail-lbl">Client</div><div class="ma-req-detail-val">'+esc(r.client)+'</div></div>';
    if(r.usage)h+='<div class="ma-req-detail-row"><div class="ma-req-detail-lbl">Usage</div><div class="ma-req-detail-val">'+esc(r.usage)+'</div></div>';
    if(r.description)h+='<div class="ma-req-detail-row"><div class="ma-req-detail-lbl">Details</div><div class="ma-req-detail-val" style="font-size:14px;line-height:1.6">'+esc(r.description)+'</div></div>';
    h+='</div>';
  }

  if(r.maNote)h+='<div style="padding:10px 20px;font-family:var(--fM);font-size:10px;color:var(--ink);background:var(--ivory);border-bottom:1px solid var(--line)">Your note: '+esc(r.maNote)+'</div>';
  if(r.respondedAt)h+='<div style="padding:6px 20px;font-family:var(--fM);font-size:9px;color:var(--faint);letter-spacing:.04em">Responded: '+esc(r.respondedAt)+'</div>';

  if(r.status==='pending'&&!compact){
    h+='<textarea class="ma-req-note" id="'+noteId+'" placeholder="Add a note (optional)\u2026" rows="2"></textarea>'
      +'<div class="ma-req-actions">'
        +'<button class="ma-approve-btn" onclick="respondToMARequest(\''+r.id+'\',\'approved\',\''+noteId+'\')">Approve</button>'
        +'<button class="ma-decline-btn" onclick="respondToMARequest(\''+r.id+'\',\'declined\',\''+noteId+'\')">Decline</button>'
      +'</div>';
  }
  h+='</div>';
  return h;
}
function respondToMARequest(id,status,noteId){
  const noteEl=document.getElementById(noteId);
  const note=noteEl?noteEl.value.trim():'';
  const list=loadMARequests();
  const i=list.findIndex(function(r){return r.id===id;});
  if(i<0)return;
  list[i].status=status;
  list[i].maNote=note;
  list[i].respondedAt=new Date().toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  saveMARequests(list);
  toast(status==='approved'?'\u2713 Approved':'\u2715 Declined');
  rerender('requests');rerender('home');
}
function renderMARequests(el){
  const all=maRequests(maWhoKey).sort(function(a,b){return (b.ts||'').localeCompare(a.ts||'');});
  const pending=all.filter(function(r){return r.status==='pending';});
  const decided=all.filter(function(r){return r.status!=='pending';});

  let h='<div class="ma-hero" style="padding:40px">'
    +'<div class="ma-hero-eye">From Maison de Veux</div>'
    +'<div class="ma-hero-name" style="font-size:clamp(34px,4vw,52px)">Approvals</div>'
    +'<div class="ma-hero-sub">Requests from the Maison that require your approval.</div>'
  +'</div><div class="cnt">';

  if(!pending.length&&!decided.length){h+='<div class="ma-empty">No requests on file</div>';}
  if(pending.length){
    h+='<div class="ma-section-hd">Awaiting Your Response \u2014 '+pending.length+'</div>';
    h+=pending.map(function(r){return maRequestCardHTML(r,false);}).join('');
  }
  if(decided.length){
    h+='<div class="ma-section-hd" style="margin-top:32px;opacity:.6">Responded</div>';
    h+=decided.map(function(r){return maRequestCardHTML(r,false);}).join('');
  }
  h+='</div>';
  el.innerHTML=h;
}

/* ===== Tasks ===== */
function completeMaTask(id){
  const list=loadMATasks();
  const i=list.findIndex(function(t){return t.id===id;});
  if(i>-1){list[i].status='completed';saveMATasks(list);}
  rerender('tasks');rerender('home');
}
function renderMATasks(el){
  const tasks=loadMATasks().filter(function(t){return t.maKey===maWhoKey;});
  const open=tasks.filter(function(t){return t.status!=='completed';});
  const done=tasks.filter(function(t){return t.status==='completed';});

  let h='<div class="ma-hero" style="padding:40px">'
    +'<div class="ma-hero-eye">Action Items</div>'
    +'<div class="ma-hero-name" style="font-size:clamp(34px,4vw,52px)">Your <em>Tasks</em></div>'
    +'<div class="ma-hero-sub">Items sent from Maison de Veux that require your attention.</div>'
  +'</div><div class="cnt">';

  h+='<div class="ma-section-hd">Open \u2014 '+open.length+'</div>';
  if(!open.length){h+='<div class="ma-empty">All caught up</div>';}
  else{
    h+=open.map(function(t){
      const m=MODELS[t.modelKey];
      return '<div class="ma-task-row"><div class="ma-task-dot'+(t.priority==='high'?' high':'')+'"></div>'
        +'<div class="ma-task-body">'
          +'<div class="ma-task-title">'+esc(t.title)+'</div>'
          +'<div class="ma-task-meta">'+(m?'Re: '+esc(m.name)+' \u00b7 ':'')+'From: '+esc(TEAM[t.from]?TEAM[t.from].name:t.from||'MDV')+(t.due?' \u00b7 Due '+esc(t.due):'')+'</div>'
        +'</div>'
        +'<button class="ma-task-check" onclick="completeMaTask(\''+t.id+'\')">&#x2714;</button>'
      +'</div>';
    }).join('');
  }
  if(done.length){
    h+='<div class="ma-section-hd" style="opacity:.5;margin-top:32px">Completed \u2014 '+done.length+'</div>';
    h+=done.map(function(t){
      return '<div class="ma-task-row" style="opacity:.4"><div class="ma-task-dot done"></div>'
        +'<div class="ma-task-body"><div class="ma-task-title done">'+esc(t.title)+'</div></div></div>';
    }).join('');
  }
  h+='</div>';
  el.innerHTML=h;
}

/* ===== Visa Status Page ===== */
function renderMAVisaStatus(el){
  const keys=myModelKeys();
  const risk=keys.filter(function(k){return visaInfo(k).status==='risk';});
  const clear=keys.filter(function(k){
    const v=visaInfo(k);return v.status!=='risk'&&v.visa&&v.visa!=='N/A'&&v.visa!=='Pending'&&v.visa!=='Schengen Pending';
  });
  const pending=keys.filter(function(k){
    const v=visaInfo(k);return v.status!=='risk'&&(!v.visa||v.visa==='N/A'||v.visa==='Pending'||v.visa==='Schengen Pending');
  });

  let h='<div class="ma-hero" style="padding:40px">'
    +'<div class="ma-hero-eye">Real-Time Status</div>'
    +'<div class="ma-hero-name" style="font-size:clamp(34px,4vw,52px)">Visa <em>Status</em></div>'
    +'<div class="ma-hero-sub">Live visa status for all of your models. Updated directly by the Maison de Veux team.</div>'
    +'<div class="ma-stat-bar">'
      +'<div class="ma-stat-item"><div class="ma-stat-n burg">'+risk.length+'</div><div class="ma-stat-l">At Risk</div></div>'
      +'<div class="ma-stat-item"><div class="ma-stat-n gold">'+pending.length+'</div><div class="ma-stat-l">Pending</div></div>'
      +'<div class="ma-stat-item"><div class="ma-stat-n sage">'+clear.length+'</div><div class="ma-stat-l">Clear</div></div>'
    +'</div>'
  +'</div><div class="cnt">';

  function visaRow(k){
    const m=MODELS[k];const v=visaInfo(k);
    const isRisk=v.status==='risk';
    const isClear=!isRisk&&v.visa&&v.visa!=='N/A'&&v.visa!=='Pending'&&v.visa!=='Schengen Pending';
    const col=isRisk?'var(--burg)':isClear?'#4a9a6a':'var(--gold)';
    const lbl=isRisk?'\u26A0 Visa Risk':isClear?'\u2713 Clear':'\u23F3 Pending';
    const hs=modelHeadshot(k);
    return '<div style="display:flex;align-items:flex-start;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)">'
      +'<div class="mc-init'+(hs?' has-img':'')+'" style="width:48px;height:48px;flex-shrink:0;font-size:16px;'+(hs?'background-image:url(\''+esc(hs).replace(/'/g,"\\'")+'\');background-size:cover;background-position:center;color:transparent':'')+'">'+esc(m.init)+'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'
          +'<div style="font-family:var(--fD);font-size:18px;color:var(--ink)">'+esc(m.name)+'</div>'
          +'<div style="font-family:var(--fM);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:'+col+';padding:4px 10px">'+lbl+'</div>'
        +'</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:16px">'
          +(v.visa?('<div><div style="font-family:var(--fM);font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Visa</div><div style="font-family:var(--fD);font-size:15px">'+esc(v.visa)+'</div></div>'):'')
          +(v.deadline?('<div><div style="font-family:var(--fM);font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Deadline</div><div style="font-family:var(--fD);font-size:15px;color:var(--burg)">'+esc(v.deadline)+'</div></div>'):'')
          +(v.notes?('<div style="flex:1;min-width:140px"><div style="font-family:var(--fM);font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Notes</div><div style="font-size:13px;color:var(--ink2)">'+esc(v.notes)+'</div></div>'):'')
        +'</div>'
      +'</div>'
      +'<span class="ma-section-act" onclick="openMAModelProfile(\''+k+'\')">Profile \u2192</span>'
    +'</div>';
  }

  if(risk.length){
    h+='<div class="ma-section-hd">Requires Attention</div>';
    h+=risk.map(visaRow).join('');
  }
  if(pending.length){
    h+='<div class="ma-section-hd" style="margin-top:'+(risk.length?'28px':'0')+'">Pending Review</div>';
    h+=pending.map(visaRow).join('');
  }
  if(clear.length){
    h+='<div class="ma-section-hd" style="margin-top:'+(risk.length||pending.length?'28px':'0')+'">Clear</div>';
    h+=clear.map(visaRow).join('');
  }
  if(!keys.length){h+='<div class="ma-empty">No models linked to your agency</div>';}
  h+='</div>';
  el.innerHTML=h;
}

</script>

</body>
</html>

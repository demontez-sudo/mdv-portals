<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maison de Veux — Partner Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">


<style>

:root{
  --ivory:#F6F2EA; --paper:#FBF9F4; --line:#E1D8C8; --line2:#D2C6B0;
  --ink:#1C1916; --ink2:#3A332C; --mute:#8C8073; --faint:#B6AB9B;
  --gold:#A8824F; --goldl:#C9A66B; --goldp:rgba(168,130,79,.10);
  --burg:#7A3B33; --burgp:rgba(122,59,51,.09);
  --sage:#5E6F52; --sagep:rgba(94,111,82,.10);
  --wblue:#5C7A99; --wbluep:rgba(92,122,153,.10);
  --wgreen:#5E8C6A; --wgreenp:rgba(94,140,106,.10);
  --wred:#A8554A; --wredp:rgba(168,85,74,.10);
  --wyellow:#B6964F; --wyellowp:rgba(182,150,79,.10);
  --fD:'Cormorant Garamond',Georgia,serif; --fB:'Inter',sans-serif; --fM:'Space Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--fB);background:var(--ivory);color:var(--ink2);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--line2)}

#login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;background:
  radial-gradient(circle at 15% 10%,rgba(168,130,79,.06),transparent 45%),
  radial-gradient(circle at 85% 90%,rgba(122,59,51,.05),transparent 45%),var(--ivory)}
.lg-card{width:100%;max-width:420px;background:var(--paper);border:1px solid var(--line);position:relative;padding:0}
.lg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.lg-top{padding:40px 36px 28px;text-align:center;border-bottom:1px solid var(--line)}
.lg-eyebrow{font-family:var(--fM);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.lg-h1{font-family:var(--fD);font-size:46px;font-weight:500;color:var(--ink);line-height:1}
.lg-h1 em{font-style:italic;color:var(--goldl)}
.lg-sub{font-family:var(--fM);font-size:11px;letter-spacing:.2em;color:var(--mute);margin-top:10px;text-transform:uppercase}
.lg-body{padding:28px 36px 36px}
.lg-lbl{font-family:var(--fM);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);display:block;margin-bottom:7px}
.lg-field{position:relative;margin-bottom:16px}
.lg-inp{width:100%;background:var(--ivory);border:1px solid var(--line2);padding:12px 14px;font-size:16px;color:var(--ink);outline:none;transition:border-color .15s}
.lg-inp:focus{border-color:var(--gold)}
.lg-results{position:absolute;top:100%;left:0;right:0;background:var(--paper);border:1px solid var(--line2);border-top:none;max-height:200px;overflow-y:auto;z-index:50;display:none;box-shadow:0 10px 30px rgba(28,25,22,.08)}
.lg-results.show{display:block}
.lg-result{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);font-size:15px}
.lg-result:last-child{border-bottom:none}
.lg-result:hover{background:var(--goldp)}
.lg-result-role{font-family:var(--fM);font-size:10px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase}
.lg-btn{width:100%;padding:14px;background:var(--ink);color:var(--paper);font-family:var(--fM);font-size:12px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;transition:background .15s}
.lg-btn:hover{background:var(--gold)}
.lg-err{font-family:var(--fM);font-size:11px;color:var(--burg);margin-top:10px;display:none;letter-spacing:.05em}
.lg-foot{text-align:center;font-family:var(--fM);font-size:10px;letter-spacing:.2em;color:var(--faint);padding:18px 0 4px;text-transform:uppercase}

#app{display:none;height:100dvh;overflow:hidden;flex-direction:column}
#app.on{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:64px;background:var(--paper);border-bottom:1px solid var(--line);flex-shrink:0;position:sticky;top:0;z-index:80}
.tb-brand{display:flex;align-items:center;gap:12px}
.tb-mark{font-family:var(--fD);font-size:24px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.tb-mark em{font-style:italic;color:var(--gold)}
.tb-tag{font-family:var(--fM);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--mute);padding-left:12px;border-left:1px solid var(--line)}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-user{display:flex;align-items:center;gap:9px}
.tb-av{width:32px;height:32px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:var(--fD);font-size:15px;font-weight:600}
.tb-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.2}
.tb-role{font-family:var(--fM);font-size:9px;letter-spacing:.16em;color:var(--mute);text-transform:uppercase}
.tb-signout{font-family:var(--fM);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);border:1px solid var(--line2);padding:7px 12px;transition:all .15s}
.tb-signout:hover{color:var(--ink);border-color:var(--ink)}
/* ===== Sign-out icon/text toggle (desktop shows text, mobile shows icon) ===== */
.tb-signout{display:flex;align-items:center;gap:6px}
.tb-signout-ico{display:none;font-size:16px}

/* ===== Panel slide-in transition — gives page nav an app-like "push" feel ===== */
@keyframes panelSlideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.panel.on{animation:panelSlideIn .32s cubic-bezier(.22,.61,.36,1) both}
@media(prefers-reduced-motion:reduce){.panel.on{animation:none}}

/* ===== Mobile: compact, centered topbar + centered page headers ===== */
@media(max-width:640px){
  .tb-tag{display:none}
  #_syncBadge{display:none!important}
  .tb-signout{padding:8px;border:none;background:none}
  .tb-signout-ico{display:block}
  .tb-signout-txt{display:none}
  .tb-user{margin-right:2px}
  .ph{padding:24px 20px 20px;text-align:center}
  .ph-eye{margin-left:auto;margin-right:auto}
  .ph-sub{max-width:100%;margin-left:auto;margin-right:auto}
}

.tb-burger{display:none;font-size:22px;color:var(--ink);padding:6px}

.shell{display:flex;flex:1;overflow:hidden}
.sidenav{width:212px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);padding:18px 0;overflow-y:auto}
.sn-grp{margin-bottom:6px}
.sn-h{font-family:var(--fM);font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:var(--faint);padding:14px 22px 6px}
.sn-b{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 22px;font-size:14px;color:var(--ink2);font-weight:500;border-left:2px solid transparent;transition:all .12s}
.sn-b:hover{background:var(--goldp);color:var(--ink)}
.sn-b.on{color:var(--ink);border-left-color:var(--gold);background:var(--goldp);font-weight:600}
.sn-ico{font-size:15px;width:18px;text-align:center;opacity:.7}

main.pm{flex:1;overflow-y:auto;background:var(--ivory)}
.panel{display:none}
.panel.on{display:block;animation:fadein .25s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.ph{padding:30px 32px 22px;border-bottom:1px solid var(--line);position:relative;overflow:hidden}
.ph::after{content:'';position:absolute;top:-100px;right:-100px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,var(--goldp),transparent 70%);pointer-events:none}
.ph-eye{font-family:var(--fM);font-size:11px;letter-spacing:.36em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.ph-h1{font-family:var(--fD);font-size:clamp(32px,4vw,52px);font-weight:500;color:var(--ink);line-height:1.02}
.ph-h1 em{font-style:italic;color:var(--goldl)}
.ph-sub{font-size:14.5px;color:var(--mute);margin-top:8px;max-width:540px;line-height:1.7}
.cnt{padding:26px 32px 70px}
@media(max-width:640px){.ph{padding:22px 18px 18px}.cnt{padding:18px 18px 90px}}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);margin-top:18px}
.stat{background:var(--paper);padding:14px 16px}
.stat-n{font-family:var(--fD);font-size:30px;font-weight:600;color:var(--ink);line-height:1}
.stat-n.gold{color:var(--gold)}.stat-n.burg{color:var(--burg)}.stat-n.sage{color:var(--sage)}
.stat-l{font-family:var(--fM);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);margin-top:5px}

.sl{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
.sl-t{font-family:var(--fM);font-size:11px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--ink);white-space:nowrap}
.sl-line{flex:1;height:1px;background:var(--line)}
.sl-act{font-family:var(--fM);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);cursor:pointer;white-space:nowrap}
.sl-act:hover{color:var(--ink)}

.tickets{display:flex;flex-direction:column;gap:10px}
.ticket{display:grid;grid-template-columns:96px 1fr auto;background:var(--paper);border:1px solid var(--line);position:relative;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.ticket:hover{border-color:var(--goldl);box-shadow:0 6px 22px rgba(28,25,22,.06)}
.tk-date{display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px dashed var(--line2);padding:14px 8px;position:relative}
.tk-date::after{content:'';position:absolute;right:-1px;top:50%;width:10px;height:10px;border-radius:50%;background:var(--ivory);transform:translate(50%,-50%);border:1px solid var(--line)}
.tk-day{font-family:var(--fM);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}
.tk-num{font-family:var(--fD);font-size:30px;font-weight:600;color:var(--ink);line-height:1}
.tk-mon{font-family:var(--fM);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.tk-mid{padding:13px 16px;min-width:0}
.tk-type{font-family:var(--fM);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.tk-title{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk-meta{font-size:13px;color:var(--mute);display:flex;gap:10px;flex-wrap:wrap}
.tk-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:13px 16px;gap:5px;text-align:right}
.tk-time{font-family:var(--fM);font-size:12px;color:var(--ink2);font-weight:700}
.tk-badge{font-family:var(--fM);font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border-radius:2px;font-weight:700}
@media(max-width:640px){.ticket{grid-template-columns:64px 1fr auto}.tk-date{padding:10px 4px}.tk-num{font-size:24px}.tk-mid{padding:11px 10px}.tk-title{font-size:15px}.tk-right{padding:11px 10px}}

.empty{padding:34px 18px;text-align:center;font-family:var(--fM);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);border:1px dashed var(--line2);background:var(--paper)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.mcard{background:var(--paper);border:1px solid var(--line);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.mcard:hover{border-color:var(--goldl);transform:translateY(-2px);box-shadow:0 10px 28px rgba(28,25,22,.10)}
.mcard-photo{width:100%;aspect-ratio:3/4;background:var(--ivory);background-size:cover;background-position:center top;position:relative;overflow:hidden}
.mcard-photo-init{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fD);font-size:52px;font-weight:500;color:var(--line2)}
.mcard-info{padding:12px 14px 14px}
.mcard .mc-init{width:40px;height:40px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:var(--fD);font-size:18px;font-weight:600;margin-bottom:10px}
.mc-n{font-family:var(--fD);font-size:20px;font-weight:600;color:var(--ink);line-height:1.15}
.mc-b{font-family:var(--fM);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-top:3px}
.mc-tags{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.tag{font-family:var(--fM);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:2px;font-weight:700}
.tag.gold{background:var(--goldp);color:var(--gold)}
.tag.burg{background:var(--burgp);color:var(--burg)}
.tag.sage{background:var(--sagep);color:var(--sage)}
.tag.blue{background:var(--wbluep);color:var(--wblue)}
.tag.green{background:var(--wgreenp);color:var(--wgreen)}
.tag.red{background:var(--wredp);color:var(--wred)}
.tag.yellow{background:var(--wyellowp);color:var(--wyellow)}

.rows{display:flex;flex-direction:column;gap:8px}
.row{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--line2);padding:14px 16px;display:flex;align-items:flex-start;gap:14px;transition:border-color .15s}
.row:hover{border-left-color:var(--gold)}
.row-main{flex:1;min-width:0}
.row-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:3px}
.row-meta{font-size:13px;color:var(--mute);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.row-actions{display:flex;gap:6px;flex-shrink:0}
.btn{font-family:var(--fM);font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding:8px 14px;border:1px solid var(--line2);color:var(--ink2);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--ink);color:var(--ink)}
.btn.pri{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.pri:hover{background:var(--gold);border-color:var(--gold)}
.btn.gold{border-color:var(--goldl);color:var(--gold)}
.btn.gold:hover{background:var(--goldp)}
.btn.sm{padding:6px 11px;font-size:9px}
.btn[disabled]{opacity:.5;cursor:default}

.alert{padding:13px 16px;border-left:3px solid;font-size:14px;line-height:1.8;background:var(--paper);margin-bottom:8px}
.alert.burg{border-color:var(--burg);background:var(--burgp)}
.alert.gold{border-color:var(--gold);background:var(--goldp)}
.alert.sage{border-color:var(--sage);background:var(--sagep)}
.alert-l{font-family:var(--fM);font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.alert.burg .alert-l{color:var(--burg)}.alert.gold .alert-l{color:var(--gold)}.alert.sage .alert-l{color:var(--sage)}

.modal-bg{position:fixed;inset:0;background:rgba(28,25,22,.45);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--paper);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 30px 80px rgba(28,25,22,.25)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}
.modal-x{position:absolute;top:14px;right:14px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line2);font-size:18px;color:var(--mute);cursor:pointer;background:var(--ivory)}
.modal-x:hover{color:var(--ink)}
.lb-bg{padding:30px;z-index:400}
.lb-wrap{position:relative;max-width:min(92vw,900px);max-height:90vh;display:flex;flex-direction:column;background:var(--ink);box-shadow:0 30px 80px rgba(0,0,0,.4)}
.lb-img{display:block;width:100%;max-height:78vh;object-fit:contain;background:var(--ink)}
.lb-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 18px;background:var(--ink)}
.lb-cap{font-family:var(--fM);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--paper);opacity:.7}
.lb-bar .mp-link-action{color:var(--goldl)}
.lb-bar .mp-link-action:hover{color:var(--paper);border-bottom-color:var(--paper)}
.lb-x{background:var(--ink);border-color:var(--ink2);color:var(--paper);top:10px;right:10px}
.lb-x:hover{color:var(--goldl)}
.m-hd{padding:26px 28px 16px;border-bottom:1px solid var(--line)}
.m-eye{font-family:var(--fM);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.m-title{font-family:var(--fD);font-size:30px;font-weight:600;color:var(--ink);line-height:1.1}
.m-bd{padding:18px 28px}
.m-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;align-items:flex-start}
.m-row:last-child{border-bottom:none}
.m-lbl{font-family:var(--fM);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);min-width:90px;flex-shrink:0;padding-top:1px}
.m-val{color:var(--ink2);flex:1;line-height:1.6}
.m-ft{padding:16px 28px 26px;display:flex;gap:8px;flex-wrap:wrap}
.f-field{margin-bottom:13px}
.f-lbl{font-family:var(--fM);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);display:block;margin-bottom:6px}
.f-inp{width:100%;background:var(--ivory);border:1px solid var(--line2);padding:10px 12px;font-size:15px;color:var(--ink);outline:none}
.f-inp:focus{border-color:var(--gold)}
.f-row{display:flex;gap:8px}
.f-row .f-field{flex:1}
textarea.f-inp{resize:vertical;min-height:64px;line-height:1.6}

.letter{background:var(--paper);border:1px solid var(--line);padding:20px;margin-bottom:10px}
.letter.unread{border-left:3px solid var(--gold);background:var(--goldp)}
.letter-from{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.letter-av{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:var(--fD);font-size:16px;font-weight:600}
.letter-name{font-size:14px;font-weight:600;color:var(--ink)}
.letter-role{font-family:var(--fM);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
.letter-body{font-size:14.5px;line-height:1.85;color:var(--ink2)}
.letter-time{font-family:var(--fM);font-size:10px;color:var(--faint);margin-top:10px;letter-spacing:.1em}

/* ===== Scroll-to-top button ===== */
.scroll-top-btn{position:fixed;bottom:28px;left:20px;width:44px;height:44px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:22px;z-index:500;box-shadow:0 4px 18px rgba(28,25,22,.25);transition:background .15s,transform .15s}
.scroll-top-btn.visible{display:flex}
.scroll-top-btn:hover{background:var(--gold);transform:translateY(-2px)}

/* ===== Change password icon in topbar ===== */
.tb-icon-btn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:15px;padding:6px 8px;transition:color .15s;display:flex;align-items:center;margin-right:4px}
.tb-icon-btn:hover{color:var(--ink)}

/* ===== Mobile bottom nav ===== */
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--line);z-index:90;height:68px;padding-bottom:env(safe-area-inset-bottom)}
.mn-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:0;transition:all .15s;position:relative}
.mn-b-ico{font-size:20px;line-height:1;transition:transform .15s}
.mn-b-lbl{font-family:var(--fM);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
.mn-b.on .mn-b-lbl{color:var(--gold)}
.mn-b.on .mn-b-ico{transform:translateY(-2px)}
.mn-b:not(.on) .mn-b-ico{color:var(--mute)}
.mn-b.on .mn-b-ico{color:var(--gold)}
.mn-more-dot{width:5px;height:5px;background:var(--burg);border-radius:50%;position:absolute;top:10px;right:calc(50% - 14px);display:none}
.mn-more-dot.show{display:block}

/* ===== More slide-up sheet ===== */

}

}

/* ===== Critical Alert Slider ===== */
.alert-slider-wrap{margin-top:18px;min-height:120px}

.acard{flex:0 0 auto;width:260px;scroll-snap-align:start;background:var(--paper);border:1px solid var(--line);border-left:4px solid;padding:14px 15px;cursor:pointer;transition:box-shadow .15s}

.acard.burg{border-left-color:var(--burg)}
.acard.gold{border-left-color:var(--gold)}
.acard.sage{border-left-color:var(--sage)}
.acard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.acard-type{font-family:var(--fM);font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:2px}
.acard.burg .acard-type{background:var(--burgp);color:var(--burg)}
.acard.gold .acard-type{background:var(--goldp);color:var(--gold)}
.acard.sage .acard-type{background:var(--sagep);color:var(--sage)}
.acard-cd{font-family:var(--fM);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);white-space:nowrap}
.acard-cd.now{color:var(--burg);font-weight:700}
.acard-title{font-family:var(--fD);font-size:19px;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:4px}
.acard-date{font-family:var(--fM);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.acard-body{font-size:13px;color:var(--mute);line-height:1.6}

/* ===== Company / Contact ===== */
.co-card{background:var(--paper);border:1px solid var(--line);padding:16px;cursor:pointer;transition:all .15s;position:relative}
.co-card:hover{border-color:var(--goldl);transform:translateY(-2px);box-shadow:0 8px 24px rgba(28,25,22,.07)}
.co-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.co-name{font-family:var(--fD);font-size:21px;font-weight:600;color:var(--ink);line-height:1.15}
.co-meta{font-family:var(--fM);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-top:3px}
.co-contacts{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px}
.chip{font-family:var(--fM);font-size:10px;letter-spacing:.06em;padding:4px 9px;border:1px solid var(--line2);border-radius:2px;color:var(--ink2);background:var(--ivory);transition:all .12s}
.chip:hover{border-color:var(--gold);color:var(--gold)}
.ct-card{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--line2);padding:14px 16px;cursor:pointer;transition:border-color .15s;position:relative}
.ct-card:hover{border-left-color:var(--gold)}
.ct-name{font-size:16px;font-weight:600;color:var(--ink)}
.ct-role{font-family:var(--fM);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-top:2px}
.ct-meta{font-size:13px;color:var(--mute);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ===== Task status pills ===== */
.task-status-row{display:flex;gap:5px;margin-top:8px}
.tsb{font-family:var(--fM);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:6px 10px;border:1px solid var(--line2);color:var(--mute);transition:all .12s}
.tsb:hover{color:var(--ink);border-color:var(--ink)}
.tsb.on{background:var(--goldp);border-color:var(--goldl);color:var(--gold)}

/* ===== Tables (Visa Tracker etc) ===== */
.vtable{width:100%;border-collapse:collapse;background:var(--paper);border:1px solid var(--line)}
.vtable th{font-family:var(--fM);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);text-align:left;padding:12px 16px;border-bottom:1px solid var(--line2);background:var(--ivory)}
.vtable td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink2)}
.vtable tr:last-child td{border-bottom:none}
.vtable td.ok{color:var(--sage);font-weight:600}
.vtable td.warn{color:var(--burg);font-weight:600}
.hard-deadline{padding:13px 16px;border-left:3px solid var(--burg);background:var(--burgp);margin-bottom:8px}

.hard-deadline .hd-b{font-family:var(--fD);font-size:21px;font-weight:600;color:var(--ink)}

/* ===== Filter pills / search bar ===== */
.fbar{display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.fbar .f-inp{flex:1;min-width:160px}
.fpill{font-family:var(--fM);font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding:9px 14px;border:1px solid var(--line2);color:var(--mute);white-space:nowrap}
.fpill.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* ===== Media grid ===== */
.media-card{background:var(--paper);border:1px solid var(--line);padding:14px}
.media-thumb{width:100%;aspect-ratio:3/4;background:linear-gradient(135deg,var(--goldp),var(--ivory));border:1px dashed var(--line2);display:flex;align-items:center;justify-content:center;font-family:var(--fM);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.media-name{font-family:var(--fD);font-size:18px;font-weight:600;color:var(--ink)}
.media-meta{font-family:var(--fM);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-top:3px}

/* ===== Critical Ticker Bar ===== */
.ticker-wrap{overflow:hidden;background:var(--ink);border-bottom:1px solid var(--line);height:30px;display:flex;align-items:center;flex-shrink:0}
.ticker-track{display:flex;white-space:nowrap;animation:tickerScroll 180s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.tk-item{display:inline-flex;align-items:center;gap:7px;padding:0 22px;font-family:var(--fM);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#D8D2C8;flex-shrink:0}
.tk-item .tk-dot{width:4px;height:4px;border-radius:50%;background:var(--gold)}
.tk-item.burg{color:#E8B4A0}
.tk-item.gold{color:#F0D9A0}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ===== Expandable Note Cards ===== */
.letter.collapsible{cursor:pointer}
.letter-body.clamped{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.letter-expand{font-family:var(--fM);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-top:6px;cursor:pointer}

/* ===== Calendar Status Pills ===== */
.cal-status-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.csb{font-family:var(--fM);font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid var(--line2);color:var(--mute);transition:all .12s;cursor:pointer;background:none}
.csb:hover{color:var(--ink)}
.csb.on{border-color:var(--goldl)}
.csb.on.pending{background:rgba(140,128,115,.12);color:var(--mute);border-color:var(--line2)}
.csb.on.inprogress{background:var(--goldp);color:var(--gold);border-color:var(--goldl)}
.csb.on.onhold{background:var(--burgp);color:var(--burg);border-color:var(--burgl,var(--burg))}
.csb.on.completed{background:var(--sagep);color:var(--sage);border-color:var(--sagel,var(--sage))}
.tk-badge.onhold{background:var(--burgp);color:var(--burg)}
.tk-badge.inprogress{background:var(--goldp);color:var(--gold)}
.tk-badge.completed{background:var(--sagep);color:var(--sage)}
.tk-badge.pending{background:rgba(140,128,115,.12);color:var(--mute)}

/* ===== Shoot/Test card expand ===== */
.shoot-card{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--goldl);padding:13px 15px;margin-bottom:3px;cursor:pointer;transition:background .1s}

.shoot-card-title{font-family:var(--fD);font-size:18px;font-weight:600;color:var(--ink)}

.shoot-card-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--line2);font-size:13px;color:var(--ink2);line-height:1.7;display:none}
.shoot-card.open .shoot-card-detail{display:block}
.shoot-card-arrow{font-family:var(--fM);font-size:11px;color:var(--gold);transition:transform .15s}

.tk-caret{font-family:var(--fM);font-size:11px;color:var(--gold);margin-left:8px;transition:transform .15s;display:inline-block}
.tcard{margin-bottom:3px}
.tcard .ticket{cursor:pointer}
.tcard-detail{display:none;background:var(--paper);border:1px solid var(--line);border-top:none;padding:13px 16px;font-size:13px;color:var(--ink2);line-height:1.7}

.mf-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.mf-opt{font-family:var(--fM);font-size:11px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--line2);padding:8px 12px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;gap:6px;background:var(--ivory)}

.mc-init.has-img,.pf-headshot.has-img,.mcard-photo.has-img{background-size:cover;background-position:center top;color:transparent;font-size:0}
.tm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.tm-card{background:var(--paper);border:1px solid var(--line);padding:20px;transition:border-color .15s}

.mp-tab-link{font-family:var(--fD);font-size:16px;font-style:italic;cursor:pointer;color:var(--mute);padding-bottom:3px;border-bottom:1px solid transparent;transition:all .15s}

   ---------------------------------------------------------------------
   Subscribes to postgres_changes on mdv_sync. Any remote insert/update
   fires a debounced refresh instead of waiting on the poll interval.
   Requires (Supabase dashboard): mdv_sync added to the supabase_realtime

var _sbRealtimeChannel=null;

function _sbLoadRealtimeLib(cb){
  if(window.supabase && window.supabase.createClient){ cb(window.supabase); return; }
  if(_sbRealtimeLibCbs){ _sbRealtimeLibCbs.push(cb); return; }
  _sbRealtimeLibCbs=[cb];
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
  s.onload=function(){
    var lib=window.supabase, queued=_sbRealtimeLibCbs; _sbRealtimeLibCbs=null;

  };
  s.onerror=function(){
    console.warn('Supabase realtime: CDN load failed — staying on polling only.');
    _sbRealtimeLibCbs=null;
  };

function _sbOnRealtimeChange(payload){
  var row=payload && (payload.new||payload.old);
  // Ignore the echo of a write we just made ourselves — already applied locally.
  if(row && row.key && _pendingPushes.has(row.key)) return;
  clearTimeout(_sbRealtimeTimer);
  _sbRealtimeTimer=setTimeout(function(){
    if(typeof syncRefresh==='function'){ syncRefresh(); }
    else if(typeof sbPullAll==='function'){ sbPullAll(function(){ rerender(window._currentPage||'overview'); }); }
  },500);
}

/* ════════════════════════════════════════════════════════════════
   ROW-LEVEL COLLABORATIVE STORES  (Tier 2)
   ---------------------------------------------------------------------
   Tasks / Calendar / Messages moved off the single mdv_sync blob onto
   real per-row tables (mdv_agent_tasks, mdv_calendar, mdv_messages).
   Each record is upserted or deleted individually by id — two people
   editing different records can no longer silently overwrite each
   other's changes, which the old "save the whole array" design could
   do on every write.
   localStorage keeps working exactly as before as the offline cache —
   loadTasks()/saveCal()/saveMessages() etc. keep the same signatures
   everywhere else in the app; only what happens inside them changes.
════════════════════════════════════════════════════════════════ */
var ROW_TABLES = {
  'mdvc_agent_tasks_2026': 'mdv_agency_tasks',
  'mdvc_cal_2026':         'mdv_calendar',
  'mdvc_messages_2026':    'mdv_messages',
  'mdvc_travel_2026':      'mdv_travel'
};
var _rowSnapshot = {}; // key -> last-known-synced array (by id), diffed against on save
var _sbLocalWriteTs={}; // key -> ms timestamp of last local write (protects against stale overwrite)

function _rowTableFor(key){ return ROW_TABLES[key] || null; }

var _explicitDeletes = {}; // key -> Set of ids deliberately marked for deletion
function markForDeletion(key, id){
  if(!_explicitDeletes[key]) _explicitDeletes[key] = new Set();
  _explicitDeletes[key].add(id);
}
function _rowDiff(key, newArr){
  var prevArr = _rowSnapshot[key] || [];
  var prevById = {}; prevArr.forEach(function(it){ if(it && it.id) prevById[it.id] = it; });
  var newById  = {}; newArr.forEach(function(it){ if(it && it.id) newById[it.id] = it; });
  var upserts = [], deletes = [];
  newArr.forEach(function(it){
    if(!it || !it.id) return;
    var prev = prevById[it.id];
    if(!prev || JSON.stringify(prev) !== JSON.stringify(it)) upserts.push(it);
  });
  var explicitSet = _explicitDeletes[key] || new Set();
  Object.keys(prevById).forEach(function(id){
    if(!newById[id] && explicitSet.has(id)) deletes.push(id);
  });
  return { upserts: upserts, deletes: deletes };
}

function _rowIndexedCols(table, item){
  if(table === 'mdv_agency_tasks'){
    return { from_key: item.fromKey||null, to_key: item.toKey||null, model_key: item.modelKey||null,
      status: item.status||null, priority: item.priority||null, due: item.due||null };
  }
  if(table === 'mdv_calendar'){
    return { owner_key: item.agent||null, model_key: item.model||null,
      event_date: item.date||null, status: item.status||null };
  }
  if(table === 'mdv_messages'){
    return { from_key: item.from||null, to_key: item.to||null,
      thread_key: item.to||item.from||null, read: !!item.read };
  }
  if(table === 'mdv_travel'){
    return { model_key: item.modelKey||null, owner_key: item.createdBy||null,
      status: item.status||null, event_date: (item.outbound&&item.outbound.date)||null };
  }
  return {};
}

// ── Save a row-store key: diff, then upsert changed rows + delete removed ids
function saveRowStore(key, newArr){
  _sbSetLocal(key, newArr);
  _sbFresh(key);
  _sbLocalWriteTs[key] = Date.now();
  var table = _rowTableFor(key);
  if(!table || !SUPABASE_CONFIG.enabled){ _rowSnapshot[key] = newArr.slice(); return Promise.resolve(newArr); }

  var diff = _rowDiff(key, newArr);
  if(!diff.upserts.length && !diff.deletes.length){ _rowSnapshot[key] = newArr.slice(); return Promise.resolve(newArr); }

  _pendingPushes.add(key);
  var jobs = [];

  if(diff.upserts.length){
    var rows = diff.upserts.map(function(it){
      return Object.assign({ id: it.id, data: it, updated_at: new Date().toISOString() }, _rowIndexedCols(table, it));
    });
    jobs.push(fetch(SUPABASE_CONFIG.url+'/rest/v1/'+table, {
      method: 'POST',
      headers: Object.assign({}, _sbHeaders(true), {'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(rows)
    }).then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error('HTTP '+r.status+': '+t); }); }));
  }
  if(diff.deletes.length){
    jobs.push(fetch(SUPABASE_CONFIG.url+'/rest/v1/'+table+'?id=in.('+diff.deletes.map(encodeURIComponent).join(',')+')', {
      method: 'DELETE', headers: _sbHeaders(false)
    }).then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error('HTTP '+r.status+': '+t); }); }));
  }

  return Promise.all(jobs).then(function(){
    setSyncBadge && setSyncBadge('synced');
    _rowSnapshot[key] = newArr.slice();
    if(_explicitDeletes[key]){ diff.deletes.forEach(function(id){ _explicitDeletes[key].delete(id); }); }
    _pendingPushes.delete(key);
    return newArr;
  }).catch(function(e){
    setSyncBadge && setSyncBadge('error', 'Will retry — '+e.message);
    _sbRetryQ.push({ key: key, data: newArr, tries: 1, ts: Date.now(), isRowStore: true });
    _persistRetryQ();
    _pendingPushes.delete(key);
    return newArr;
  });
}

// ── Pull a row-store key: fetch all rows, rebuild the local array from them
var _pullSeq = {}; // key -> sequence number of the most recently INITIATED pull for that key
function pullRowStore(key, onDone){
  var table = _rowTableFor(key);
  if(!table || !SUPABASE_CONFIG.enabled){ onDone && onDone(); return Promise.resolve({key:key, ok:true}); }
  if(_pendingPushes.has(key)){ onDone && onDone(); return Promise.resolve({key:key, ok:true}); }
  var lastWrite = _sbLocalWriteTs[key] || 0;
  if(Date.now() - lastWrite < 4000){ onDone && onDone(); return Promise.resolve({key:key, ok:true}); }
  if(_sbRetryQ.some(function(item){ return item.key===key; })){ onDone && onDone(); return Promise.resolve({key:key, ok:true}); }
  // Tag this specific pull with a sequence number. If a second pull for the
  // same key starts before this one finishes, and this older one resolves
  // second, its response is stale and must be discarded rather than
  // overwriting the newer, correct data already on screen.
  _pullSeq[key] = (_pullSeq[key]||0) + 1;
  var mySeq = _pullSeq[key];
  return fetch(SUPABASE_CONFIG.url+'/rest/v1/'+table+'?select=*', { headers: _sbHeaders(false) })
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(rows){
      if(_pullSeq[key] !== mySeq){ onDone && onDone(); return {key:key, ok:true, stale:true}; }
      var recovered = 0;
      var arr = (rows||[]).map(function(r){
        if(r.data && typeof r.data==='object' && Object.keys(r.data).length){ return r.data; }
        if(r.id){
          recovered++;
          console.warn('[MDV] Row '+r.id+' in '+table+' had an empty/malformed data column — reconstructed from indexed columns. This row needs to be re-saved properly.', r);
          return {
            id: r.id,
            title: '\u26A0 Recovered task \u2014 please re-edit and save (original details were lost)',
            fromKey: r.from_key||'', toKey: r.to_key||'', modelKey: r.model_key||'',
            status: r.status||'open', due: r.due||'',
            priority: 'normal', category: 'Other',
            notes: 'This task\u2019s content was missing in the database and had to be reconstructed from limited data. Please verify and re-save it.',
            _recovered: true
          };
        }
        return null;
      }).filter(Boolean);
      if(recovered>0 && typeof toast==='function'){
        toast('\u26A0 Recovered '+recovered+' task(s) with missing data \u2014 check console for details');
      }
      _sbSetLocal(key, arr);
      _sbFresh(key);
      _rowSnapshot[key] = arr.slice();
      onDone && onDone(arr);
      return {key:key, ok:true, recovered:recovered};
    })
    .catch(function(e){
      console.warn('pullRowStore('+key+') failed:', e.message);
      onDone && onDone();
      return {key:key, ok:false, error:e.message};
    });
}

function savePortfolioPhotosRow(modelKey, images){
  if(!SUPABASE_CONFIG.enabled) return;
  var prevArr = _photoSnapshot[modelKey] || [];
  var prevById = {}; prevArr.forEach(function(p){ if(p && p.id) prevById[p.id] = p; });

  var upserts = [], deletes = [];
  (images||[]).forEach(function(p){
    if(!p || !p.id) return;
    var prev = prevById[p.id];
    if(!prev || JSON.stringify(prev) !== JSON.stringify(p)) upserts.push(p);
  });
  Object.keys(prevById).forEach(function(id){ if(!newById[id]) deletes.push(id); });
  _photoSnapshot[modelKey] = (images||[]).slice();
  if(!upserts.length && !deletes.length) return;

/* ════════════════════════════════════════════════════════════════
   SUPABASE-FIRST DATA LAYER  v2
   • All saves go to Supabase immediately (not fire-and-forget)
   • localStorage used only as session cache (5-min TTL)
   • Retry queue for failed writes
   • Background refresh every 90s for critical stores
   • No 5MB localStorage limit for data (only cache)
════════════════════════════════════════════════════════════════ */

// ── Cache freshness tracking ────────────────────────────────────
var _sbCacheTs  = {};          // key → last-synced timestamp
var _sbRetryQ   = [];          // { key, data, tries, ts }
var SB_CACHE_TTL = 3 * 60 * 1000;  // 3 min

var RETRY_Q_KEY = 'mdv_retry_queue_2026';
function _persistRetryQ(){ try{ localStorage.setItem(RETRY_Q_KEY, JSON.stringify(_sbRetryQ)); }catch(e){} }
function _setRetryQ(newArr){ _sbRetryQ = newArr; _persistRetryQ(); }
function _hydrateRetryQ(){
  try{
    var saved = JSON.parse(localStorage.getItem(RETRY_Q_KEY)||'[]');
    if(saved && saved.length){ _sbRetryQ = saved; }
  }catch(e){}
}

function _sbStale(key){ return !_sbCacheTs[key] || (Date.now()-_sbCacheTs[key]) > SB_CACHE_TTL; }
function _sbFresh(key){ _sbCacheTs[key] = Date.now(); }

// ── Core helpers ────────────────────────────────────────────────
function _sbHeaders(write){
  var h = {'apikey': SUPABASE_CONFIG.anonKey, 'Authorization': 'Bearer '+SUPABASE_CONFIG.anonKey};
  if(write) h['Content-Type'] = 'application/json';
  return h;
}
function _sbSetLocal(key, data){
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}
function _sbGetLocal(key){
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

// ── Direct Supabase write — returns Promise ─────────────────────
function sbWrite(key, data){
  _sbSetLocal(key, data);   // cache immediately
  _sbFresh(key);
  if(!SUPABASE_CONFIG.enabled) return Promise.resolve(data);

  return fetch(SUPABASE_CONFIG.url+'/rest/v1/mdv_sync', {
    method: 'POST',
    headers: Object.assign({}, _sbHeaders(true), {'Prefer':'resolution=merge-duplicates,return=minimal'}),
    body: JSON.stringify({key:key, data:data, updated_at:new Date().toISOString()})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error('HTTP '+r.status+': '+t); });
    setSyncBadge && setSyncBadge('synced');
    return data;
  }).catch(function(e){
    setSyncBadge && setSyncBadge('error','Will retry — '+e.message);
    _sbRetryQ.push({key:key, data:data, tries:1, ts:Date.now()});
    _persistRetryQ();
    return data;  // return data anyway so UI doesn't break
  });
}

// ── Direct Supabase read — returns Promise<data> ─────────────── 
function sbRead(key){
  if(!SUPABASE_CONFIG.enabled){
    return Promise.resolve(_sbGetLocal(key));
  }
  return fetch(
    SUPABASE_CONFIG.url+'/rest/v1/mdv_sync?key=eq.'+encodeURIComponent(key)+'&select=data',
    { headers: _sbHeaders(false) }
  ).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(rows){
    var d = (rows && rows[0] && rows[0].data !== undefined) ? rows[0].data : null;
    if(d !== null){ _sbSetLocal(key, d); _sbFresh(key); }
    return d !== null ? d : _sbGetLocal(key);
  }).catch(function(e){
    console.warn('sbRead('+key+') failed:', e.message);
    return _sbGetLocal(key);
  });
}

// ── Retry queue — runs every 30s, and once immediately on load in case
// there's anything persisted from before a refresh ──────────────────
function _flushRetryQueue(){
  if(!_sbRetryQ.length || !SUPABASE_CONFIG.enabled) return;
  var now = Date.now();
  _setRetryQ(_sbRetryQ.filter(function(item){ return item.tries < 6; }));
  _sbRetryQ.forEach(function(item){
    if(now - item.ts < 15000 * item.tries) return;   // exponential backoff
    item.tries++;
    item.ts = now;
    _persistRetryQ();
    if(item.isRowStore){
      saveRowStore(item.key, item.data).then(function(){
        _setRetryQ(_sbRetryQ.filter(function(x){ return x !== item; }));
      }).catch(function(){});
      return;
    }
    fetch(SUPABASE_CONFIG.url+'/rest/v1/mdv_sync',{
      method:'POST',
      headers:Object.assign({},_sbHeaders(true),{'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body:JSON.stringify({key:item.key, data:item.data, updated_at:new Date().toISOString()})
    }).then(function(r){
      if(r.ok){
        _setRetryQ(_sbRetryQ.filter(function(x){ return x !== item; }));
        if(!_sbRetryQ.length) setSyncBadge && setSyncBadge('synced');
      }
    }).catch(function(){});
  });
}
setInterval(_flushRetryQueue, 30000);
_hydrateRetryQ();
if(_sbRetryQ.length){
  setSyncBadge && setSyncBadge('error','Resuming '+_sbRetryQ.length+' unsaved change(s) from before…');
  setTimeout(_flushRetryQueue, 2000);
}

/* ===== IndexedDB-backed storage for heavy data (photos, digitals, documents).
   localStorage has a small quota (5-10MB) and base64 images blow past it fast.
   IndexedDB has a much larger quota, so the heaviest keys live there instead,
   mirrored into an in-memory cache so the rest of the app can keep reading
   them synchronously exactly as before. ===== */
var IDB_NAME='mdvc_files_2026';
var IDB_STORE='kv';
var _idbInstance=null;
function idbOpen(){
  return new Promise(function(resolve,reject){
    if(_idbInstance){resolve(_idbInstance);return;}
    if(!window.indexedDB){reject(new Error('IndexedDB unavailable'));return;}
    const req=indexedDB.open(IDB_NAME,2);
    req.onupgradeneeded=function(){ if(!req.result.objectStoreNames.contains(IDB_STORE)) req.result.createObjectStore(IDB_STORE); };
    req.onsuccess=function(){_idbInstance=req.result;resolve(_idbInstance);};
    req.onerror=function(){reject(req.error);};
  });
}
function idbGet(key){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).get(key);
      req.onsuccess=function(){resolve(req.result);};
      req.onerror=function(){reject(req.error);};
    });
  });
}
function idbSet(key,value){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      const tx=db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).put(value,key);
      tx.oncomplete=function(){resolve();};
      tx.onerror=function(){reject(tx.error);};
    });
  });
}
var HEAVY_KEYS=['mdvc_portfolio_2026','mdvc_digitals_2026','mdvc_documents_2026'];
/* Keys that must NEVER be pushed to Supabase — they contain large base64 image
   data that bloats the mdv_sync table and causes statement timeouts (error 57014).
   These stay in IndexedDB on this device only. */
function isBase64Url(s){return typeof s==='string'&&s.startsWith('data:');}
/* Strip base64 image data from a portfolio/digitals entry before pushing to Supabase.
   URL-based images (Supabase Storage) are tiny strings — safe to sync.
   Base64 blobs are large — strip them so only the URL reference syncs. */
function sanitizePhotoEntryForSync(entry){
  if(!entry)return null;
  const images=(entry.images||[]).filter(function(img){return img&&img.url&&!isBase64Url(img.url);});
  const headshot=(entry.headshot&&!isBase64Url(entry.headshot))?entry.headshot:'';
  if(!images.length&&!headshot)return null; // nothing worth syncing
  return Object.assign({},entry,{images:images,headshot:headshot});
}
function sanitizeDocsForSync(arr){
  if(!Array.isArray(arr))return null;
  const clean=arr.filter(function(d){return d&&d.url&&!isBase64Url(d.url);});
  return clean.length?clean:null;
}
function isSyncable(key){

  }

var _pfCache=null,_dgCache=null,_docCache=null;
function setHeavyCache(key,val){
  if(key==='mdvc_portfolio_2026')_pfCache=val;
  else if(key==='mdvc_digitals_2026')_dgCache=val;
  else if(key==='mdvc_documents_2026')_docCache=val;

function getHeavyCache(key){

function legacyMigrateHeavy(key){
  return new Promise(function(resolve){
    let raw=null;
    try{raw=localStorage.getItem(key);}catch(e){}
    if(!raw){resolve({});return;}
    let parsed={};
    try{parsed=JSON.parse(raw);}catch(e){}
    idbSet(key,parsed).then(function(){
      try{localStorage.removeItem(key);}catch(e){}
      resolve(parsed);

    });
  });
}
function hydrateHeavyStores(cb){
  Promise.all(HEAVY_KEYS.map(function(key){
    return idbGet(key).then(function(v){return v!==undefined?v:legacyMigrateHeavy(key);}).catch(function(){return legacyMigrateHeavy(key);});
  })).then(function(results){
    HEAVY_KEYS.forEach(function(key,i){setHeavyCache(key,results[i]||{});});
    cb();
  }).catch(function(e){
    console.warn('Heavy store hydration failed, falling back to localStorage',e);
    HEAVY_KEYS.forEach(function(key){

function sbPullAll(onDone){
  if(!SUPABASE_CONFIG.enabled){onDone&&onDone();return;}

  // longer live in mdv_sync so they're not part of the fetch below. This
  // used to be fire-and-forget: nothing waited for these before the rest
  // of sbPullAll declared itself done, so the page could render before the
  // real data had actually landed, with nothing to refresh it afterward.
  var rowStorePulls = ['mdvc_agent_tasks_2026','mdvc_cal_2026','mdvc_messages_2026','mdvc_travel_2026','mdvc_madocs_2026']
    .map(function(k){ return pullRowStore(k); });
  var blobFetchDone = fetch(SUPABASE_CONFIG.url+'/rest/v1/mdv_sync?select=key,data&apikey='+encodeURIComponent(SUPABASE_CONFIG.anonKey))
    .then(function(r){
      if(!r.ok)return r.text().then(function(t){throw new Error('HTTP '+r.status+': '+t);});
      return r.json();
    })
    .then(function(rows){
      const heavyBase={},heavyComposite={};
      (rows||[]).forEach(function(row){
        if(!row||!row.key||row.data===undefined||row.data===null)return;
        if(_pendingPushes.has(row.key))return;
        const ci=row.key.indexOf('::');
        if(ci>-1){
          const baseKey=row.key.slice(0,ci),modelKey=row.key.slice(ci+2);
          if(HEAVY_KEYS.indexOf(baseKey)>-1){
            if(!heavyComposite[baseKey])heavyComposite[baseKey]={};

      });
      HEAVY_KEYS.forEach(function(baseKey){
        if(!heavyBase[baseKey]&&!heavyComposite[baseKey])return;
        const existing=getHeavyCache(baseKey)||{};
        /* Merge: prefer existing local entry for a model if it has base64 images
           (richer data), otherwise take the incoming URL-based entry from Supabase. */
        const incoming=Object.assign({},heavyBase[baseKey]||{},heavyComposite[baseKey]||{});
        const merged=Object.assign({},existing);
        Object.keys(incoming).forEach(function(modelKey){
          const inc=incoming[modelKey];

          /* Keep local if local has base64 images (uploaded on this device);
             merge in any URL-based images from remote that aren't already local. */
          const localHasBase64=(loc.images||[]).some(function(img){return img&&isBase64Url(img.url);});
          if(localHasBase64){merged[modelKey]=loc;return;}

      });

    })
    .catch(function(e){_syncFailCount++;console.warn('Sync pull error ('+_syncFailCount+'/3): '+syncErrLabel(e));return {key:'mdv_sync', ok:false, error:e.message};});

  var syncTimeout = new Promise(function(resolve){ setTimeout(function(){ resolve('timeout'); }, 20000); });
  Promise.race([Promise.all(rowStorePulls.concat([blobFetchDone])), syncTimeout]).then(function(results){
    var anyFailed = Array.isArray(results) && results.some(function(r){ return r && r.ok===false; });
    if(results==='timeout'){

    } else {

/* Panels that contain image grids — never auto-refresh these during sync polling

var NOSYNC_RERENDER=['portfolio','digitals','nf-women','nf-men','est-women','est-men','multipackage','mymodels','maprofile'];
var _lastSyncHash='';
function syncDataHash(){
  const watched=[CAL_KEY,TASK_KEY,NOTE_KEY,MEAS_KEY,VISA_KEY,
    HEADSHOTS_KEY,COMM_KEY,MATASK_KEY,MAREQ_KEY,MODEL_CONTACTS_KEY,RATES_KEY,TRAVEL_KEY,PASS_KEY];
  return watched.map(function(k){
    const v=localStorage.getItem(k);
    if(!v) return '0';
    var h=0;
    for(var i=0;i<v.length;i++){ h=((h<<5)-h+v.charCodeAt(i))|0; }
    return v.length+':'+h;
  }).join('|');
}
function syncRefresh(){
  if(!SUPABASE_CONFIG.enabled)return;
  sbPullAll(function(){
    const newHash=syncDataHash();
    if(newHash===_lastSyncHash)return; // nothing changed — no re-render, no flash
    _lastSyncHash=newHash;
    // Only refresh panels that are currently visible and not image-heavy
    Object.keys(_panels).forEach(function(p){
      if(NOSYNC_RERENDER.indexOf(p)>-1)return; // skip image grids — user navigates to refresh
      const panelEl=_panels[p];
      if(!panelEl.classList.contains('on'))return; // skip invisible panels
      if(panelHasUnsavedInput(panelEl))return;   // skip if user is mid-input
      rerender(p);
    });
  });
}

  const bg=document.createElement('div');bg.className='modal-bg';bg.id='_modal';
  bg.onclick=function(e){if(e.target===bg)bg.remove();};
  bg.innerHTML='<div class="modal" style="max-width:480px">'
    +'<button class="modal-x" onclick="closeModal()">\u00d7</button>'
    +'<div class="m-hd"><div class="m-eye">Sync Error</div><div class="m-title">Connection to sync server failed</div></div>'
    +'<div class="m-bd">'
      +'<div style="font-family:var(--fM);font-size:12px;line-height:1.6;color:var(--ink2);background:var(--ivory);border:1px solid var(--line);padding:12px;word-break:break-word">'+esc(_lastSyncErrorDetail||'No detail available')+'</div>'
      +'<div style="margin-top:14px;font-size:13px;color:var(--mute)">Local changes are saved on this device and will sync automatically once the connection is restored. Common causes: the Supabase project is paused (free-tier projects pause after inactivity), an RLS policy is blocking writes, or a network/CORS issue.</div>'
    +'</div>'
    +'<div class="m-ft">'
      +'<button class="btn pri" onclick="closeModal();syncRefresh();">Retry Now</button>'
      +'<button class="btn" onclick="closeModal()">Close</button>'
    +'</div>'
  +'</div>';
  document.body.appendChild(bg);
}

function daysUntil(dateStr){

}
function countdownLabel(n){

}

/* ===== Google Form integration =====
   To connect: create a Google Form with fields matching the contact form below,
   open it, click the three-dot menu > "Get pre-filled link", fill in dummy values
   for each field, generate the link, and copy the entry.XXXXXXXXX IDs from the URL
   into GOOGLE_FORM_CONFIG.entries below. Then set formUrl to the form's
   "formResponse" action URL (replace /viewform with /formResponse). */
var GOOGLE_FORM_CONFIG={
  enabled:false,
  formUrl:'https://docs.google.com/forms/d/e/REPLACE_WITH_FORM_ID/formResponse',
  entries:{
    name:'entry.000000001',
    role:'entry.000000002',
    company:'entry.000000003',
    agency:'entry.000000004',
    marketFocus:'entry.000000005',
    email:'entry.000000006',
    email2:'entry.000000007',
    phone:'entry.000000008'
  }
};
function submitToGoogleForm(data){
  if(!GOOGLE_FORM_CONFIG.enabled)return;
  const iframe=document.createElement('iframe');
  iframe.name='_gform_target';
  iframe.style.display='none';
  document.body.appendChild(iframe);
  const form=document.createElement('form');
  form.action=GOOGLE_FORM_CONFIG.formUrl;
  form.method='POST';
  form.target='_gform_target';
  Object.keys(data).forEach(function(key){
    const entryId=GOOGLE_FORM_CONFIG.entries[key];
    if(!entryId)return;
    const input=document.createElement('input');
    input.type='hidden';
    input.name=entryId;
    input.value=data[key]||'';
    form.appendChild(input);
  });
  document.body.appendChild(form);
  form.submit();
  setTimeout(function(){form.remove();iframe.remove();},2000);
}

function loadCompanies(){try{return JSON.parse(localStorage.getItem(CO_KEY)||'[]');}catch(e){return[];}}
function saveCompanies(d){localStorage.setItem(CO_KEY,JSON.stringify(d));sbPush(CO_KEY,d);}
function loadContacts(){try{return JSON.parse(localStorage.getItem(CT_KEY)||'[]');}catch(e){return[];}}
function saveContacts(d){localStorage.setItem(CT_KEY,JSON.stringify(d));sbPush(CT_KEY,d);}
function companiesForContact(ctId){const COMPANIES=loadCompanies(),CONTACTS=loadContacts();return COMPANIES.filter(function(c){const ct=CONTACTS.find(x=>x.id===ctId);return ct&&ct.companies.indexOf(c.id)>-1;});}
function contactsForCompany(coId){return loadContacts().filter(function(ct){return ct.companies.indexOf(coId)>-1;});}
function deleteCompany(id){
  if(!confirm('Delete this company? Linked contacts will be unlinked, not deleted.'))return;
  saveCompanies(loadCompanies().filter(function(c){return c.id!==id;}));
  const contacts=loadContacts();
  let touched=false;
  contacts.forEach(function(ct){
    if(ct.companies&&ct.companies.indexOf(id)>-1){ct.companies=ct.companies.filter(function(cid){return cid!==id;});touched=true;}
  });
  if(touched)saveContacts(contacts);
  closeModal();
  toast('Company deleted');
  rerender('companies');rerender('allcontacts');rerender('calendar');
}
function deleteContact(id){
  if(!confirm('Delete this contact? This cannot be undone.'))return;
  saveContacts(loadContacts().filter(function(ct){return ct.id!==id;}));
  closeModal();
  toast('Contact deleted');
  rerender('allcontacts');rerender('companies');rerender('calendar');
}
function slugify(name){return name.toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0,24)||'item';}

function daysUntilDue(lastUpdated,cadenceDays){
  if(!lastUpdated)return -9999;
  const due=addD(new Date(lastUpdated+'T12:00:00'),cadenceDays);
  const today=new Date(dk(new Date())+'T12:00:00');
  return Math.round((due-today)/86400000);
}

  });
}
function reminderCountdownLabel(r){
  if(r.never)return 'Never recorded';
  if(r.overdue)return (r.daysLeft*-1)+' day'+((r.daysLeft*-1)!==1?'s':'')+' overdue';
  if(r.daysLeft===0)return 'Due today';
  return 'Due in '+r.daysLeft+' day'+(r.daysLeft!==1?'s':'');

function inchesToCm(str){
  const n=parseFloat(str);
  if(!isNaN(n)&&/^[\d.\s/]+$/.test(String(str).trim()))return Math.round(n*2.54*10)/10;
  return null;
}
function heightToCm(str){
  const m=String(str).match(/(\d+)\s*(?:'|ft)\s*(\d+(?:\.\d+)?)?\s*(?:"|in)?/i);
  if(m){
    const ft=parseFloat(m[1])||0;
    const inch=parseFloat(m[2])||0;
    return Math.round((ft*30.48+inch*2.54)*10)/10;
  }
  return null;
}

function togglePackageImage(modelKey,source,imgId,panelKey){
  const pkgs=loadPackages();
  if(!pkgs[modelKey])pkgs[modelKey]=[];
  const idx=pkgs[modelKey].findIndex(function(e){return e.source===source&&e.id===imgId;});
  if(idx>-1){pkgs[modelKey].splice(idx,1);toast('Removed from Model Package');}
  else{pkgs[modelKey].push({source:source,id:imgId});toast('\u2605 Added to Model Package');}
  savePackages(pkgs);
  rerender(panelKey);
}
function resolvePackageImage(entry,modelKey){
  if(entry.source==='portfolio'){
    const pf=loadPortfolio()[modelKey];
    const img=pf&&pf.images.find(function(i){return i.id===entry.id;});
    return img?Object.assign({},img,{source:'portfolio'}):null;
  }
  const dg=loadDigitals()[modelKey]||[];
  const img=dg.find(function(i){return i.id===entry.id;});
  return img?Object.assign({},img,{source:'digitals'}):null;
}

function downloadHTMLFile(html,filename){
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
function openClientProfilePage(modelKey){
  const html=generateClientProfileHTML(modelKey);
  const safeName=MODELS[modelKey].name.replace(/[^a-z0-9\-_]+/gi,'-').replace(/^-+|-+$/g,'')||modelKey;
  downloadHTMLFile(html,'MDV-'+safeName+'-Profile.html');
}
function reorderModelImages(source,modelKey,draggedId,targetId){
  if(!draggedId||!targetId||draggedId===targetId)return;
  if(source==='portfolio'){
    const pf=loadPortfolio();
    const arr=pf[modelKey]&&pf[modelKey].images;
    if(!arr)return;
    const fromIdx=arr.findIndex(function(i){return i.id===draggedId;});
    const toIdx=arr.findIndex(function(i){return i.id===targetId;});
    if(fromIdx<0||toIdx<0)return;
    const item=arr.splice(fromIdx,1)[0];
    arr.splice(toIdx,0,item);
    savePortfolio(pf,modelKey);
  }else{
    const dg=loadDigitals();
    const arr=dg[modelKey];
    if(!arr)return;
    const fromIdx=arr.findIndex(function(i){return i.id===draggedId;});
    const toIdx=arr.findIndex(function(i){return i.id===targetId;});
    if(fromIdx<0||toIdx<0)return;
    const item=arr.splice(fromIdx,1)[0];
    arr.splice(toIdx,0,item);
    saveDigitals(dg,modelKey);
  }
}
var _imgDragState=null;
function imgDragStart(e,id,source,modelKey){
  _imgDragState={id:id,source:source,modelKey:modelKey};
  if(e.dataTransfer){e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',id);}catch(err){}}
  if(e.currentTarget)e.currentTarget.classList.add('dragging');
}
function imgDragOver(e){
  e.preventDefault();
  if(e.dataTransfer)e.dataTransfer.dropEffect='move';
  if(e.currentTarget)e.currentTarget.classList.add('drag-over');
}
function imgDragLeave(e){
  if(e.currentTarget)e.currentTarget.classList.remove('drag-over');
}
function imgDragEnd(e){
  if(e.currentTarget)e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.book-img.drag-over').forEach(function(el){el.classList.remove('drag-over');});
}
function imgDrop(e,targetId,source,modelKey,panelKey){
  e.preventDefault();
  if(e.currentTarget)e.currentTarget.classList.remove('drag-over');
  if(!_imgDragState||_imgDragState.source!==source||_imgDragState.modelKey!==modelKey){_imgDragState=null;return;}
  reorderModelImages(source,modelKey,_imgDragState.id,targetId);
  _imgDragState=null;
  rerender(panelKey);
}

function docIcon(mime){
  if(mime&&mime.indexOf('pdf')>-1)return '\uD83D\uDCD5';

function readFileAsDataURL(file,callback,onError){
  function fail(msg){if(onError)onError(msg);else toast(msg);}
  if(!file)return;
  if(file.size>20*1024*1024){fail('File is too large (max 20MB)');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const dataUrl=e.target.result;
    const ext=(file.name||'file').split('.').pop().toLowerCase()||'bin';
    uploadToSupabaseStorage(dataUrlToBlob(dataUrl),file.type||'application/octet-stream',ext,function(url){
      callback(url,file);
    });
  };
  reader.onerror=function(){fail('Could not read that file');};
  reader.readAsDataURL(file);
}
function processMultipleFiles(files,onEach,onDone){
  const list=Array.prototype.slice.call(files||[]);
  let idx=0,succeeded=0,failed=0;
  function next(){
    if(idx>=list.length){onDone(succeeded,failed);return;}
    const f=list[idx++];
    readFileAsDataURL(f,function(dataUrl){succeeded++;onEach(dataUrl,f);next();},function(){failed++;next();});
  }
  next();
}

/* ===== Client-side image upload processing (resize+compress to a JPEG data URL, no backend needed) ===== */
function dataUrlToBlob(dataUrl){
  const arr=dataUrl.split(',');
  const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);
  let n=bstr.length;
  const u8=new Uint8Array(n);
  while(n--)u8[n]=bstr.charCodeAt(n);
  return new Blob([u8],{type:mime});
}
function uploadToSupabaseStorage(blob,mime,ext,callback){
  if(!SUPABASE_CONFIG.enabled){
    const r=new FileReader();r.onload=function(e){callback(e.target.result);};r.readAsDataURL(blob);
    return;
  }
  const path='files/'+Date.now()+'-'+Math.random().toString(36).slice(2)+'.'+ext;
  // Supabase Storage uses PUT to upsert; POST only creates new objects
  fetch(SUPABASE_CONFIG.url+'/storage/v1/object/mdv-files/'+path,{
    method:'POST',
    headers:{
      'Authorization':'Bearer '+SUPABASE_CONFIG.anonKey,
      'apikey':SUPABASE_CONFIG.anonKey,
      'Content-Type':mime,
      'x-upsert':'true',
      'Cache-Control':'3600'
    },
    body:blob
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error('HTTP '+r.status+': '+t);});
    const url=SUPABASE_CONFIG.url+'/storage/v1/object/public/mdv-files/'+path;
    callback(url);
  }).catch(function(e){
    console.warn('Supabase Storage upload failed:',e.message);
    // Visible warning so agent/model knows this photo is device-local only
    toast('\u26A0 Photo saved locally only \u2014 upload failed, please try again.');
    setSyncBadge('error','Storage upload failed: '+e.message);
    // Fallback: store as base64 on this device
    const r=new FileReader();r.onload=function(ev){callback(ev.target.result);};r.readAsDataURL(blob);
  });
}
function processImageFile(file,callback,onError){
  function fail(msg){if(onError)onError(msg);else toast(msg);}
  if(!file)return;
  if(!file.type||file.type.indexOf('image/')!==0){fail('Please choose an image file');return;}
  if(file.size>15*1024*1024){fail('Image is too large (max 15MB)');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const maxDim=1400;
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*(maxDim/w));w=maxDim;}
        else{w=Math.round(w*(maxDim/h));h=maxDim;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      let dataUrl;
      try{dataUrl=canvas.toDataURL('image/jpeg',0.85);}catch(err){fail('Could not process that image');return;}
      uploadToSupabaseStorage(dataUrlToBlob(dataUrl),'image/jpeg','jpg',callback);
    };
    img.onerror=function(){fail('Could not read that image file');};
    img.src=e.target.result;
  };
  reader.onerror=function(){fail('Could not read that file');};
  reader.readAsDataURL(file);
}
function processMultipleImageFiles(files,onEach,onDone){
  const list=Array.prototype.slice.call(files||[]);
  let idx=0,succeeded=0,failed=0;
  function next(){
    if(idx>=list.length){onDone(succeeded,failed);return;}
    const f=list[idx++];
    processImageFile(f,function(dataUrl){succeeded++;onEach(dataUrl,f);next();},function(){failed++;next();});
  }
  next();
}

function timeOptions(selected){
  var times=[];
  ['AM','PM'].forEach(function(p){
    for(var h=0;h<12;h++){
      var hr=h===0?12:h;
      ['00','15','30','45'].forEach(function(m){times.push(hr+':'+m+' '+p);});
    }
  });
  return times.map(function(t){
    return '<option value="'+t+'"'+(t===selected?' selected':'')+'>'+t+'</option>';
  }).join('');
}

function navTo(p){
  document.querySelectorAll('.sn-b,.mn-b').forEach(function(b){b.classList.toggle('on',b.dataset.p===p);});
  document.querySelectorAll('.mob-more-item').forEach(function(b){b.classList.toggle('on',b.dataset.p===p);});
  // Show a dot on "More" tab if the active page is in secondary nav
  const moreBtn=document.getElementById('mn-more-btn');
  const moreDot=document.getElementById('mn-more-dot');
  const flat=Array.from(document.querySelectorAll('.mob-more-item')).map(function(b){return b.dataset.p;});
  if(moreBtn)moreBtn.classList.toggle('on',flat.indexOf(p)>-1);
  if(moreDot)moreDot.classList.toggle('show',flat.indexOf(p)>-1);
  document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('on');});
  if(!_panels[p]){const el=document.createElement('div');el.className='panel';document.getElementById('pm').appendChild(el);_panels[p]=el;}
  _panels[p].classList.add('on');
  _dirtyPanels.delete(p); // fresh view of this page — any prior unsaved state here is moot now
  build(p,_panels[p]);
  document.getElementById('pm').scrollTop=0;
  closeSB();
}
function rerender(p, force){
  if(!(_panels[p]&&_panels[p].classList.contains('on')))return;
  // Central guard: never blow away text someone is actively typing in THIS
  // panel — this check always applies, force or not.
  if(_dirtyPanels.has(p))return;
  // The modal check only guards against a BACKGROUND sync shifting the page
  // under someone's feet. A deliberate click (filter, tab, etc.) can pass
  // force=true to bypass it safely — the modal is a sibling overlay, not
  // part of the panel being rebuilt, so it's unaffected either way.
  if(!force && _dirtyPanels.has('__modal__'))return;
  _dirtyPanels.delete(p);
  build(p,_panels[p]);
}

function confirmBooking(id){
  const cal=loadCal();const i=cal.findIndex(function(e){return e.id===id;});if(i<0)return;
  cal[i].confirmed=true;cal[i].status='confirmed';saveCal(cal);
  closeModal();
  toast('\u2713 Booking confirmed');
  rerender('mycal');rerender('home');
}

function onEventCompanyChange(coId){
  const wrap=document.getElementById('_f-newco-wrap');
  if(wrap)wrap.style.display=(coId==='__new__'?'block':'none');
  const ctSel=document.getElementById('_f-contact');
  const clientField=document.getElementById('_f-client');
  if(coId&&coId!=='__new__'){
    const co=loadCompanies().find(function(c){return c.id===coId;});
    if(co){
      if(clientField&&!clientField.value)clientField.value=co.name;
      const cityField=document.getElementById('_f-city');
      if(cityField&&!cityField.value&&co.market&&co.market!=='\u2014')cityField.value=co.market;
    }
    const cts=contactsForCompany(coId);
    let opts='<option value="">— No specific contact —</option>';
    cts.forEach(function(ct){opts+='<option value="'+ct.id+'">'+esc(ct.name)+' \u00b7 '+esc(ct.role)+'</option>';});
    if(ctSel)ctSel.innerHTML=opts;
  }else{
    if(ctSel)ctSel.innerHTML='<option value="">— No specific contact —</option>';
  }
}
function saveEvent(id){
  const title=document.getElementById('_f-title').value.trim();
  if(!title){toast('Enter a title');return;}
  const cal=loadCal();
  const existing=id?cal.find(function(e){return e.id===id;}):null;
  const studio=document.getElementById('_f-studio').value;
  const city=document.getElementById('_f-city').value;
  const address=document.getElementById('_f-addr').value;
  const loc=[studio,city].filter(Boolean).join(', ')||address;
  let companyId='';
  const coSel=document.getElementById('_f-company');
  const coVal=coSel?coSel.value:'';
  if(coVal==='__new__'){
    const newName=document.getElementById('_f-newco').value.trim();
    if(newName){
      const coList=loadCompanies();
      let match=coList.find(function(c){return c.name.toLowerCase()===newName.toLowerCase();});
      if(!match){
        match={id:slugify(newName)+Date.now().toString(36),name:newName,type:'Other',market:city||'\u2014'};
        coList.push(match);
        saveCompanies(coList);
      }
      companyId=match.id;
    }
  }else if(coVal){
    companyId=coVal;
  }
  const contactId=document.getElementById('_f-contact')?document.getElementById('_f-contact').value:'';
  const base={
    type:document.getElementById('_f-type').value,
    status:document.getElementById('_f-status').value,
    title:title,
    client:document.getElementById('_f-client').value,
    companyId:companyId,
    contactId:contactId,
    date:document.getElementById('_f-date').value,
    time:document.getElementById('_f-time').value,
    studio:studio,
    city:city,
    country:fv('_f-country'),
    address:address,
    loc:loc,
    usageType:fv('_f-usagetype'),
    rateType:fv('_f-ratetype'),
    paymentTerms:fv('_f-payterms'),
    transportNotes:fv('_f-transportnotes'),
    photographer:fv('_f-photo'),
    creativeDirector:fv('_f-cd'),
    artDirector:fv('_f-artdirector'),
    castingDirector:fv('_f-castingdirector'),
    stylist:fv('_f-sty'),
    producer:fv('_f-producer'),
    hairStylist:fv('_f-hair'),
    makeupArtist:fv('_f-mua'),
    setDesigner:fv('_f-setdesign'),
    rate:document.getElementById('_f-rate').value,
    notes:document.getElementById('_f-notes').value,
    castingFormat:fv('_fc-format'),
    callbackLikely:fv('_fc-callback'),
    lookRequirements:fv('_fc-look'),
    arrivalWindow:fv('_fc-arrival'),
    decisionBy:fv('_fc-decision'),
    castingBrief:fv('_fc-brief'),
    shootType:fv('_fs-shoottype'),
    shootDay:fv('_fs-day'),
    callTime:fv('_fs-call'),
    wrapTime:fv('_fs-wrap'),
    looksCount:fv('_fs-looks'),
    usageTerms:fv('_fs-usage'),
    transportation:fv('_fs-transport'),
    mealsProvided:fv('_fs-meals'),
    shotList:fv('_fs-shotlist')
  };
  const groupChk=document.getElementById('_f-group');
  const isGroup=(!id&&groupChk&&groupChk.checked);
  if(isGroup){
    const target=document.getElementById('_f-grouptarget').value;
    let keys=[];
    if(target==='all')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].active!==false;});
    else if(target==='nf-women')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='New Face'&&MODELS[k].gender==='Women'&&MODELS[k].active!==false;});
    else if(target==='nf-men')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='New Face'&&MODELS[k].gender==='Men'&&MODELS[k].active!==false;});
    else if(target==='est-women')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='Established'&&MODELS[k].gender==='Women'&&MODELS[k].active!==false;});
    else if(target==='est-men')keys=Object.keys(MODELS).filter(function(k){return MODELS[k].stage==='Established'&&MODELS[k].gender==='Men'&&MODELS[k].active!==false;});
    else if(target==='custom')keys=Array.prototype.slice.call(document.querySelectorAll('._f-custom-model:checked')).map(function(cb){return cb.value;});
    if(!keys.length){toast('Select at least one model for the group');return;}
    const groupId='grp'+Date.now();
    keys.forEach(function(k,idx){
      cal.push(Object.assign({},base,{id:'ev'+Date.now()+'_'+idx,model:k,groupId:groupId,confirmed:false}));
    });
    saveCal(cal);
    closeModal();
    toast('\u2713 Booking added for '+keys.length+' model'+(keys.length>1?'s':''));
    rerender('calendar');rerender('overview');
    return;
  }
  const obj=Object.assign({},base,{
    id:id||('ev'+Date.now()),
    model:document.getElementById('_f-model').value,
    confirmed:existing?existing.confirmed||false:false,
    groupId:existing?existing.groupId||'':''
  });
  if(id){const i=cal.findIndex(function(e){return e.id===id;});cal[i]=obj;}else cal.push(obj);
  saveCal(cal);
  closeModal();
  toast('\u2713 Booking saved');
  rerender('calendar');rerender('overview');
}

var calOffset=0;
var calViewMode='agenda';
function setCalView(mode,panelKey){calViewMode=mode;rerender(panelKey);}
function renderCalendar(el){
  const isModel=(typeof isAgent!=='undefined')&&!isAgent;
  const cal=loadCal();
  const filtered=isModel?cal.filter(function(e){return e.model===whoKey;}):cal;
  const today=new Date();today.setHours(0,0,0,0);
  const start=addD(today,calOffset);
  const panelKey=isModel?'mycal':'calendar';

  let h='<div class="ph">'
    +'<div class="ph-eye">'+(isModel?'My Schedule':'Agency Calendar')+'</div>'
    +'<h1 class="ph-h1">'+(isModel?'My <em>Bookings</em>':'The <em>Calendar</em>')+'</h1>'
    +'<div class="ph-sub">'+(isModel?'Your confirmed and pending appointments. Tap any booking to view full details, change status, or confirm your attendance.':'Two-week agenda or weekly grid across the full roster. Tap any booking to view, edit, or change its status.')+'</div>'
  +'</div><div class="cnt">';

  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">'
    +'<button class="btn" onclick="calOffset-=7;rerender(\''+panelKey+'\',true)">\u2190 Prev Week</button>'
    +'<button class="btn" onclick="calOffset=0;rerender(\''+panelKey+'\',true)\">Today</button>'
    +'<button class="btn" onclick="calOffset+=7;rerender(\''+panelKey+'\',true)">Next Week \u2192</button>'
    +'<div class="view-toggle" style="margin-left:8px">'
      +'<button class="'+(calViewMode==='agenda'?'on':'')+'" onclick="setCalView(\'agenda\',\''+panelKey+'\')">Agenda</button>'
      +'<button class="'+(calViewMode==='week'?'on':'')+'" onclick="setCalView(\'week\',\''+panelKey+'\')">Week</button>'
    +'</div>'
    +((typeof isAgent!=='undefined'&&isAgent)?'<button class="btn pri" style="margin-left:auto" onclick="openEvent(null)">+ New Booking</button>':'')
  +'</div>';

  if(calViewMode==='week'){
    const dow=start.getDay();
    const mondayDiff=(dow===0?-6:1-dow);
    const weekStart=addD(start,mondayDiff);
    const weekDays=[];for(let i=0;i<7;i++)weekDays.push(addD(weekStart,i));
    h+='<div class="week-grid">';
    weekDays.forEach(function(d){
      const dKey=dk(d);
      const evs=filtered.filter(function(e){return e.date===dKey;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
      const isToday=dKey===dk(today);
      h+='<div class="week-day">'
        +'<div class="week-day-hd'+(isToday?' today':'')+'">'+DOW[d.getDay()]+'<br>'+MON[d.getMonth()]+' '+d.getDate()+'</div>'
        +'<div class="week-day-body">'
        +(evs.length?evs.map(function(e){
          const t=evCol(e.type);
          return '<div class="week-evt" style="border-left-color:'+t.c+'" onclick="openEvent(\''+e.id+'\')">'
            +'<div class="week-evt-time">'+esc(e.time||'TBD')+'</div>'
            +'<div class="week-evt-title">'+esc(e.title)+'</div>'
          +'</div>';
        }).join(''):'<div style="font-size:11px;color:var(--faint)">No bookings</div>')
        +'</div>'
      +'</div>';
    });
    h+='</div>';
  }else{
    const days=[];for(let i=0;i<14;i++)days.push(addD(start,i));
    days.forEach(function(d){
      const dKey=dk(d);
      const evs=filtered.filter(function(e){return e.date===dKey;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
      const isToday=dKey===dk(today);
      h+='<div class="sl" style="margin-top:18px"><div class="sl-t" style="color:'+(isToday?'var(--gold)':'var(--ink)')+'">'+DOW[d.getDay()]+' · '+MON[d.getMonth()]+' '+d.getDate()+(isToday?' — TODAY':'')+'</div><div class="sl-line"></div></div>';
      h+=evs.length?('<div class="tickets">'+evs.map(function(e){return ticketCardHTML(e);}).join('')+'</div>'):'<div class="empty">No bookings</div>';
    });
  }

  h+='</div>';
  el.innerHTML=h;
}

}

  const atRisk=entries.filter(function(e){return e[1].status==='risk';});
  const withDeadline=atRisk.filter(function(e){return e[1].deadline;}).sort(function(a,b){return a[1].deadline.localeCompare(b[1].deadline);});
  const nextDeadline=withDeadline.length?withDeadline[0][1].deadline:null;

  let h='<div class="ph">'
    +'<div class="ph-eye">Season Operations</div>'
    +'<h1 class="ph-h1">Visa <em>Tracker</em></h1>'

  +'</div><div class="cnt">';

    const d=new Date(nextDeadline+'T12:00:00');
    h+='<div class="alert burg"><div class="alert-l">Nearest Deadline — '+MON[d.getMonth()]+' '+d.getDate()+'</div>'+withDeadline.length+' model(s) at risk with a documentation deadline approaching. All paperwork to Troy by COB.</div>';

    h+='<div class="alert burg"><div class="alert-l">'+atRisk.length+' Model(s) At Risk</div>No deadline set yet \u2014 edit each model below to add one.</div>';
  }

  h+='<div class="sl"><div class="sl-t">Roster Visa Status</div><div class="sl-line"></div></div>';
  h+='<div class="rows">';
  entries.forEach(function(e){
    const k=e[0],v=e[1],m=MODELS[k];

    if(risk){

      +'<div class="row-meta"><span>'+esc(m.market)+'</span><span style="color:'+(risk?'var(--burg)':'var(--sage)')+'">'+esc(v.visa)+'</span>'+(v.notes?('<span>'+esc(v.notes)+'</span>'):'')+'</div>'

function toggleSectionExpand(hd){
  var body = hd.nextElementSibling;
  if(!body) return;
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  var arr = hd.querySelector('div:last-child');
  if(arr) arr.textContent = open ? '\u25be' : '\u25b4';
}

/* ===== Helpers ===== */
function myModelKeys(){return maModels(maWhoKey);}
function myBookings(){
  const keys=myModelKeys();
  return loadCal().filter(function(e){return keys.indexOf(e.model)>-1;});
}
function bookingsByModel(){
  const keys=myModelKeys();
  const result={};
  keys.forEach(function(k){result[k]=[];});
  loadCal().forEach(function(e){if(result[e.model])result[e.model].push(e);});
  return result;
}

        +(t.modelKey?('<div class="ma-task-meta">Re: '+esc(MODELS[t.modelKey]?MODELS[t.modelKey].name:t.modelKey)+(t.due?' \u00b7 Due '+esc(t.due):'')+'</div>'):'')
        +'</div></div>';
    }).join('');
  }

  // Agency Workshop tasks an agent assigned directly to this mother agency —
  // strictly filtered to this MA's own key, same isolation as models get.
  var workshopTasks = (typeof loadAgentTasks==='function'?loadAgentTasks():[])
    .filter(function(t){ return t.toKey===maWhoKey; });
  if(workshopTasks.length){
    h+='<div class="ma-section-hd">From Maison de Veux</div>';

        +'</div></div>';
    }).join('');
  }
  h+='</div>';
  el.innerHTML=h;
}
